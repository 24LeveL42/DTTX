<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>TACMAP — Unit View</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { height: 100%; overflow: hidden; background: #0a0f0d; color: #c8e6c9; font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; }

    header {
      background: #111a14;
      border-bottom: 1px solid #1f3a24;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .logo { font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #39ff6a; letter-spacing: 3px; }
    .unit-badge { background: rgba(57,255,106,0.1); border: 1px solid #1f3a24; padding: 4px 10px; font-size: 14px; font-weight: 700; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #4a6950; margin-left: auto; }
    .dot.live { background: #39ff6a; box-shadow: 0 0 6px #39ff6a; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

    #turn-banner {
      padding: 10px; text-align: center; font-size: 14px; font-weight: 700;
      letter-spacing: 1px; background: #111a14; border-bottom: 1px solid #1f3a24;
      color: #4a6950; flex-shrink: 0;
    }
    #turn-banner.your-turn {
      background: rgba(57,255,106,0.15); border-bottom-color: #39ff6a;
      color: #39ff6a; animation: glow 1.5s infinite;
    }
    @keyframes glow { 0%,100%{box-shadow:inset 0 0 10px rgba(57,255,106,0.1)}50%{box-shadow:inset 0 0 25px rgba(57,255,106,0.25)} }

    /* MAP AREA */
    #map-wrap {
      flex: 1; position: relative; overflow: hidden;
      background: #0e1a10;
      touch-action: none;
    }

    /* Grid */
    #map-wrap::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(57,255,106,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(57,255,106,0.04) 1px, transparent 1px);
      background-size: 50px 50px; pointer-events: none; z-index: 1;
    }

    /* Other units */
    .unit-marker {
      position: absolute;
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: #000;
      border: 2px solid rgba(255,255,255,0.3);
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
    }
    .unit-marker .unit-label {
      position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #4a6950; white-space: nowrap; margin-top: 2px;
      font-family: 'Share Tech Mono', monospace;
    }

    /* MY unit - draggable */
    #my-unit {
      position: absolute;
      width: 50px; height: 50px;
      border-radius: 50%;
      background: #39ff6a;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; color: #000;
      border: 3px solid #fff;
      transform: translate(-50%, -50%);
      z-index: 10;
      cursor: grab;
      box-shadow: 0 0 20px rgba(57,255,106,0.6);
      transition: box-shadow 0.1s;
    }
    #my-unit.dragging { 
      box-shadow: 0 0 35px rgba(57,255,106,0.9);
      cursor: grabbing;
    }
    #my-unit .you-label {
      position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #39ff6a; white-space: nowrap;
      font-family: 'Share Tech Mono', monospace; letter-spacing: 1px;
    }
    #my-unit .callsign-label {
      position: absolute; top: 110%; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #39ff6a; white-space: nowrap;
      font-family: 'Share Tech Mono', monospace;
    }

    /* Tap-to-move hint */
    #tap-hint {
      position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(10,15,13,0.9); border: 1px solid #1f3a24;
      padding: 8px 16px; font-size: 12px; color: #4a6950;
      font-family: 'Share Tech Mono', monospace; white-space: nowrap; z-index: 20;
      pointer-events: none;
    }
    #tap-hint.active { border-color: #39ff6a; color: #39ff6a; }

    #confirm-btn {
      display: none; position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: #39ff6a; color: #000; border: none;
      padding: 14px 36px; font-size: 16px; font-weight: 700;
      font-family: 'Rajdhani', sans-serif; letter-spacing: 2px;
      cursor: pointer; z-index: 30; box-shadow: 0 0 20px rgba(57,255,106,0.5);
    }

    #status-bar {
      background: #111a14; border-top: 1px solid #1f3a24;
      padding: 8px 14px; display: flex; justify-content: space-between;
      font-size: 12px; flex-shrink: 0;
    }
    .si { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .sl { font-size: 9px; color: #4a6950; letter-spacing: 1px; text-transform: uppercase; }
    .sv { font-family: 'Share Tech Mono', monospace; font-size: 12px; }
    .sv.accent { color: #39ff6a; }

    #loading { position: fixed; inset: 0; background: #0a0f0d; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 999; }
    .spinner { width: 40px; height: 40px; border: 2px solid #1f3a24; border-top-color: #39ff6a; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #4a6950; }
    #error-screen { position: fixed; inset: 0; background: #0a0f0d; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 24px; text-align: center; z-index: 999; }
    #error-screen h2 { color: #ff4444; font-size: 20px; }
    #error-screen p { color: #4a6950; font-size: 13px; line-height: 1.6; }

    /* Phase line and objectives drawn as divs */
    .phase-line { position: absolute; left: 0; right: 0; height: 1px; background: rgba(0,229,255,0.2); border-top: 1px dashed rgba(0,229,255,0.2); z-index: 2; pointer-events: none; }
    .phase-label { position: absolute; font-size: 10px; color: rgba(0,229,255,0.35); font-family: 'Share Tech Mono', monospace; z-index: 2; pointer-events: none; }
    .obj-marker { position: absolute; width: 24px; height: 24px; border: 1px solid rgba(255,170,0,0.4); display: flex; align-items: center; justify-content: center; font-size: 10px; color: rgba(255,170,0,0.5); transform: translate(-50%,-50%); z-index: 2; pointer-events: none; }
    .obj-label { position: absolute; font-size: 9px; color: rgba(255,170,0,0.4); font-family: 'Share Tech Mono', monospace; transform: translateX(-50%); z-index: 2; pointer-events: none; }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>CONNECTING TO TACMAP…</p></div>
<div id="error-screen"><h2>⚠ ERROR</h2><p id="error-msg">Could not connect.</p></div>

<header>
  <div class="logo">⬡ TACMAP</div>
  <div class="unit-badge" id="unit-badge">—</div>
  <div class="dot" id="conn-dot"></div>
</header>

<div id="turn-banner">WAITING FOR TURN…</div>

<div id="map-wrap">
  <!-- Static map decorations -->
  <div class="phase-line" id="phase-line" style="top:40%"></div>
  <div class="phase-label" id="phase-lbl" style="top:calc(40% - 16px); left:50%; transform:translateX(-50%)">PHASE LINE 1</div>
  <div class="obj-marker" style="left:15%;top:20%">★</div>
  <div class="obj-label" style="left:15%;top:calc(20% + 18px)">OBJ A</div>
  <div class="obj-marker" style="left:75%;top:25%">★</div>
  <div class="obj-label" style="left:75%;top:calc(25% + 18px)">OBJ B</div>
  <div class="obj-marker" style="left:50%;top:65%">★</div>
  <div class="obj-label" style="left:50%;top:calc(65% + 18px)">OBJ C</div>

  <div id="other-units"></div>
  <div id="my-unit">
    <span class="you-label">▲ YOU</span>
    <span id="my-letter">?</span>
    <span class="callsign-label" id="my-callsign-lbl">—</span>
  </div>

  <div id="tap-hint">TAP MAP TO MOVE YOUR UNIT</div>
  <button id="confirm-btn" onclick="confirmMove()">✓ CONFIRM MOVE</button>
</div>

<div id="status-bar">
  <div class="si"><span class="sl">Unit</span><span class="sv accent" id="sb-unit">—</span></div>
  <div class="si"><span class="sl">Callsign</span><span class="sv" id="sb-callsign">—</span></div>
  <div class="si"><span class="sl">Status</span><span class="sv" id="sb-status">OFFLINE</span></div>
  <div class="si"><span class="sl">Turn</span><span class="sv" id="sb-turn">—</span></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session');
const myUnitId = params.get('unit');

if (!sessionId || !myUnitId) showError('Invalid QR code.');

const firebaseConfig = {
  apiKey: "AIzaSyAbKI8JQ4VoZ6pr7UrSl_ovk10f0dx1AsU",
  authDomain: "dttx-98e49.firebaseapp.com",
  databaseURL: "https://dttx-98e49-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dttx-98e49",
  storageBucket: "dttx-98e49.firebasestorage.app",
  messagingSenderId: "42966455501",
  appId: "1:42966455501:web:857c386cbbad3269e34584"
};

let db, allUnits = {}, myUnit = null, currentTurnUnitId = null, isMyTurn = false;
let pendingX = null, pendingY = null, hasPendingMove = false;

const unitColors = ['#ff4444','#4488ff','#44ff88','#ffcc00','#ff88ff','#ff8800','#88ffff','#cccccc'];
function getColor(id) { return unitColors[Math.abs((id || '').charCodeAt((id||'').length-1) || 0) % unitColors.length]; }

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-screen').style.display = 'flex';
  document.getElementById('error-msg').textContent = msg;
}

function init() {
  try {
    const app = firebase.initializeApp(firebaseConfig, 'player_' + Date.now());
    db = firebase.database(app);
  } catch(e) { showError('Firebase error: ' + e.message); return; }

  db.ref('.info/connected').on('value', snap => {
    const ok = snap.val();
    document.getElementById('conn-dot').className = 'dot' + (ok ? ' live' : '');
    document.getElementById('sb-status').textContent = ok ? 'LIVE' : 'RECONNECT';
    if (ok) {
      db.ref(sessionId + '/connections/' + myUnitId).set(true);
      db.ref(sessionId + '/connections/' + myUnitId).onDisconnect().remove();
    }
  });

  db.ref(sessionId + '/units').on('value', snap => {
    const data = snap.val();
    if (!data) { showError('Session not found.'); return; }
    allUnits = data;
    myUnit = data[myUnitId];
    if (!myUnit) { showError('Unit not found. Ask host to reshare QR.'); return; }
    document.getElementById('loading').style.display = 'none';
    updateMyUnit();
    renderOtherUnits();
  });

  db.ref(sessionId + '/turn').on('value', snap => {
    const turn = snap.val();
    if (!turn) return;
    currentTurnUnitId = turn.activeUnitId;
    isMyTurn = currentTurnUnitId === myUnitId;
    updateTurnBanner();
    renderOtherUnits(); // refresh highlights when turn changes
  });
}

function updateMyUnit() {
  if (!myUnit) return;
  const wrap = document.getElementById('map-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const el = document.getElementById('my-unit');
  const x = hasPendingMove ? pendingX : myUnit.x;
  const y = hasPendingMove ? pendingY : myUnit.y;
  el.style.left = (x * W) + 'px';
  el.style.top = (y * H) + 'px';
  el.style.background = getColor(myUnitId);
  document.getElementById('my-letter').textContent = (myUnit.callsign || '?')[0];
  document.getElementById('my-callsign-lbl').textContent = myUnit.callsign || '';
  document.getElementById('unit-badge').textContent = myUnit.name || '—';
  document.getElementById('sb-unit').textContent = myUnit.name || '—';
  document.getElementById('sb-callsign').textContent = myUnit.callsign || '—';
}

function renderOtherUnits() {
  const wrap = document.getElementById('map-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const container = document.getElementById('other-units');
  container.innerHTML = '';
  // Use Object.entries so we have both key and value
  Object.entries(allUnits).forEach(([key, u]) => {
    if (!u) return;
    const uid = u.id || key;
    if (uid === myUnitId) return; // skip own unit
    const isActiveTurn = uid === currentTurnUnitId;
    const div = document.createElement('div');
    div.className = 'unit-marker';
    div.style.left = (u.x * W) + 'px';
    div.style.top = (u.y * H) + 'px';
    div.style.background = getColor(uid);
    div.style.opacity = isActiveTurn ? '1' : '0.65';
    div.style.border = isActiveTurn ? '2px solid #ffaa00' : '2px solid rgba(255,255,255,0.3)';
    div.style.boxShadow = isActiveTurn ? '0 0 12px rgba(255,170,0,0.6)' : 'none';
    div.style.width = '36px';
    div.style.height = '36px';
    div.innerHTML = `<span style="font-weight:700;font-size:14px;color:#000">${(u.callsign||'?')[0]}</span><div class="unit-label">${u.callsign||''}</div>`;
    container.appendChild(div);
  });
}

function updateTurnBanner() {
  const banner = document.getElementById('turn-banner');
  const currentUnit = allUnits[currentTurnUnitId];
  if (isMyTurn) {
    banner.className = 'your-turn';
    banner.textContent = '▶ YOUR TURN — TAP MAP TO MOVE';
    document.getElementById('tap-hint').className = 'active';
    document.getElementById('tap-hint').textContent = 'TAP ANYWHERE TO PLACE YOUR UNIT';
    document.getElementById('sb-turn').textContent = 'YOURS';
  } else {
    banner.className = '';
    const name = currentUnit ? currentUnit.callsign : '—';
    banner.textContent = `WAITING — ${name} IS MOVING`;
    document.getElementById('tap-hint').className = '';
    document.getElementById('tap-hint').textContent = 'STAND BY…';
    document.getElementById('sb-turn').textContent = currentUnit ? currentUnit.callsign : '—';
    hasPendingMove = false;
    document.getElementById('confirm-btn').style.display = 'none';
    updateMyUnit();
  }
}

// ═══════════════════════════════════════
// TAP / DRAG TO MOVE
// ═══════════════════════════════════════
const mapWrap = document.getElementById('map-wrap');

function handleMove(clientX, clientY) {
  if (!isMyTurn) return;
  const rect = mapWrap.getBoundingClientRect();
  pendingX = Math.max(0.02, Math.min(0.98, (clientX - rect.left) / rect.width));
  pendingY = Math.max(0.02, Math.min(0.98, (clientY - rect.top) / rect.height));
  hasPendingMove = true;
  document.getElementById('confirm-btn').style.display = 'block';
  document.getElementById('tap-hint').textContent = 'TAP CONFIRM TO SEND';
  updateMyUnit();
}

mapWrap.addEventListener('touchstart', e => {
  if (!isMyTurn) return;
  e.preventDefault();
  handleMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

mapWrap.addEventListener('touchmove', e => {
  if (!isMyTurn) return;
  e.preventDefault();
  handleMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

mapWrap.addEventListener('mousedown', e => handleMove(e.clientX, e.clientY));
mapWrap.addEventListener('mousemove', e => { if (e.buttons === 1) handleMove(e.clientX, e.clientY); });

function confirmMove() {
  if (!hasPendingMove || !db) return;
  db.ref(sessionId + '/units/' + myUnitId).update({ x: pendingX, y: pendingY });
  if (allUnits[myUnitId]) { allUnits[myUnitId].x = pendingX; allUnits[myUnitId].y = pendingY; }
  hasPendingMove = false;
  document.getElementById('confirm-btn').style.display = 'none';
  document.getElementById('turn-banner').className = '';
  document.getElementById('turn-banner').textContent = '✓ MOVE SENT — WAITING FOR NEXT TURN';
  document.getElementById('tap-hint').textContent = 'MOVE CONFIRMED';
  document.getElementById('tap-hint').className = '';
  updateMyUnit();
}

window.addEventListener('resize', () => { updateMyUnit(); renderOtherUnits(); });

if (sessionId && myUnitId) init();
</script>
</body>
</html>
