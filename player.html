<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>TACMAP</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root{--ac:#39ff6a;--acr:57,255,106;--bg:#0a0f0d;--sf:#111a14;--bd:#1f3a24;--dm:#4a6950;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:#c8e6c9;font-family:system-ui,sans-serif;display:flex;flex-direction:column;}
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
    .spinner{width:40px;height:40px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading p{font-family:monospace;font-size:13px;color:var(--dm);}
    #err{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;text-align:center;z-index:999;}
    #err h2{color:#ff4444;font-size:20px;}#err p{color:var(--dm);font-size:13px;line-height:1.6;}
    header{background:var(--sf);border-bottom:1px solid var(--bd);padding:7px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .logo{font-family:monospace;font-size:12px;color:var(--ac);letter-spacing:3px;}
    .badge{background:rgba(var(--acr),0.1);border:1px solid var(--bd);padding:3px 8px;font-size:13px;font-weight:700;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--dm);margin-left:auto;flex-shrink:0;}
    .dot.live{background:var(--ac);box-shadow:0 0 8px var(--ac);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    /* TOOLBAR */
    #tbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:4px 8px;display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;}
    #tbar span{font-size:9px;color:var(--dm);letter-spacing:1px;font-family:monospace;}
    .tb{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;touch-action:manipulation;flex-shrink:0;}
    .tb.on{border-color:#fff;}
    .sz-wrap{display:flex;align-items:center;gap:3px;}
    #szSlider{width:50px;accent-color:var(--ac);cursor:pointer;}
    .qbtn{margin-left:auto;background:transparent;border:1px solid #ff4444;color:#ff4444;padding:2px 7px;font-size:11px;font-weight:700;cursor:pointer;touch-action:manipulation;flex-shrink:0;}
    /* DRAW TOOLBAR */
    #dbar{background:#0d1a0f;border-bottom:1px solid var(--bd);padding:4px 8px;display:none;align-items:center;gap:6px;flex-shrink:0;}
    #dbar.show{display:flex;}
    .dc{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;touch-action:manipulation;flex-shrink:0;}
    .dc.on{border-color:#fff;box-shadow:0 0 5px rgba(255,255,255,0.5);}
    .dsz{width:50px;accent-color:var(--ac);}
    .dbtn{background:transparent;border:1px solid var(--dm);color:var(--dm);padding:2px 8px;font-size:11px;cursor:pointer;touch-action:manipulation;}
    .dbtn.on{border-color:var(--ac);color:var(--ac);}
    /* BANNER */
    #banner{padding:7px;text-align:center;font-size:13px;font-weight:700;letter-spacing:1px;background:var(--sf);border-bottom:1px solid var(--bd);color:var(--dm);flex-shrink:0;}
    #banner.yt{background:rgba(var(--acr),0.15);border-bottom-color:var(--ac);color:var(--ac);animation:gb 1.5s infinite;}
    @keyframes gb{0%,100%{box-shadow:inset 0 0 10px rgba(var(--acr),0.1)}50%{box-shadow:inset 0 0 25px rgba(var(--acr),0.3)}}
    /* MAP */
    #mwrap{flex:1;position:relative;overflow:hidden;background:#1a1a1a;touch-action:none;}
    #minner{position:absolute;top:0;left:0;transform-origin:0 0;}
    #minner img{display:block;}
    #drawCanvas{position:absolute;top:0;left:0;pointer-events:none;}
    .um{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;transform:translate(-50%,-50%);pointer-events:none;}
    .ul{position:absolute;top:100%;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:monospace;text-shadow:0 0 4px #000,0 0 4px #000;color:#fff;margin-top:2px;}
    #mu{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;transform:translate(-50%,-50%);z-index:10;cursor:pointer;}
    .yl{position:absolute;bottom:110%;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:monospace;letter-spacing:1px;text-shadow:0 0 4px #000;}
    .cl{position:absolute;top:110%;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:monospace;text-shadow:0 0 4px #000;}
    #zbtns{position:absolute;right:8px;bottom:8px;display:flex;flex-direction:column;gap:5px;z-index:20;}
    .zb{width:36px;height:36px;background:rgba(0,0,0,0.75);border:1px solid var(--bd);color:var(--ac);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px;touch-action:manipulation;}
    .zb:active{background:rgba(var(--acr),0.2);}
    #hint{position:absolute;top:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border:1px solid var(--bd);padding:4px 10px;font-size:10px;color:var(--dm);font-family:monospace;white-space:nowrap;z-index:20;pointer-events:none;border-radius:2px;}
    #hint.on{border-color:var(--ac);color:var(--ac);}
    #cfm{display:none;width:100%;padding:13px;background:var(--ac);color:#000;border:none;font-size:16px;font-weight:700;letter-spacing:2px;cursor:pointer;flex-shrink:0;touch-action:manipulation;}
    /* CHAT */
    #chat{background:var(--sf);border-top:1px solid var(--bd);flex-shrink:0;display:flex;flex-direction:column;max-height:160px;}
    #cmsgs{flex:1;overflow-y:auto;padding:5px 8px;font-size:12px;min-height:50px;max-height:100px;}
    .cm{margin-bottom:3px;line-height:1.4;}
    .cs{font-family:monospace;font-size:10px;color:var(--ac);}
    .cs.h{color:#ffaa00;}
    .ct{font-size:9px;color:var(--dm);margin-left:3px;}
    #crow{display:flex;border-top:1px solid var(--bd);flex-shrink:0;}
    #cinput{flex:1;background:transparent;border:none;color:#c8e6c9;padding:7px 8px;font-size:13px;outline:none;}
    #csend{background:var(--ac);border:none;color:#000;padding:7px 12px;font-weight:700;font-size:12px;cursor:pointer;touch-action:manipulation;flex-shrink:0;}
    /* QUIT MODAL */
    #qm{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;}
    #qm.open{display:flex;}
    .qbox{background:var(--sf);border:1px solid #ff4444;padding:24px;text-align:center;width:260px;}
    .qbox h3{color:#ff4444;font-size:18px;margin-bottom:8px;}
    .qbox p{color:var(--dm);font-size:12px;margin-bottom:16px;}
    .qrow{display:flex;gap:10px;}
    .qy{flex:1;padding:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:#ff4444;color:#fff;touch-action:manipulation;}
    .qn{flex:1;padding:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:var(--bd);color:#c8e6c9;touch-action:manipulation;}
  </style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p id="ldmsg">LOADING…</p></div>
<div id="err"><h2>⚠ ERROR</h2><p id="errmsg">Could not connect.</p></div>

<header>
  <div class="logo">⬡ TACMAP</div>
  <div class="badge" id="badge">—</div>
  <div class="dot" id="dot"></div>
</header>

<div id="tbar">
  <span>THEME</span>
  <div class="tb on" style="background:#39ff6a" onclick="setTheme('green',this)"></div>
  <div class="tb" style="background:#ff4444" onclick="setTheme('red',this)"></div>
  <div class="tb" style="background:#4488ff" onclick="setTheme('blue',this)"></div>
  <div class="tb" style="background:#ffcc00" onclick="setTheme('yellow',this)"></div>
  <div class="sz-wrap"><span>ICON</span>
    <input type="range" id="szSlider" min="10" max="80" value="44" step="2" oninput="iconBase=+this.value;localStorage.setItem('ib',iconBase);drawUnits()"/>
  </div>
  <button class="dbtn" id="drawToggle" onclick="toggleDraw()">✏ DRAW</button>
  <button class="qbtn" onclick="document.getElementById('qm').classList.add('open')">✕ QUIT</button>
</div>

<!-- DRAW TOOLBAR -->
<div id="dbar">
  <span>COLOR</span>
  <div class="dc on" style="background:#ff4444" data-c="#ff4444" onclick="setDrawColor(this)"></div>
  <div class="dc" style="background:#39ff6a" data-c="#39ff6a" onclick="setDrawColor(this)"></div>
  <div class="dc" style="background:#4488ff" data-c="#4488ff" onclick="setDrawColor(this)"></div>
  <div class="dc" style="background:#ffcc00" data-c="#ffcc00" onclick="setDrawColor(this)"></div>
  <span>SIZE</span>
  <input type="range" class="dsz" min="1" max="20" value="3" oninput="drawSize=+this.value"/>
  <button class="dbtn" onclick="undoDraw()">↩ UNDO</button>
  <button class="dbtn" onclick="clearMyDrawings()">🗑 CLEAR</button>
</div>

<div id="banner">WAITING FOR TURN…</div>

<div id="mwrap">
  <div id="minner">
    <img id="mimg" src="https://24level42.github.io/DTTX/map.jpg" alt=""/>
    <canvas id="drawCanvas"></canvas>
    <div id="ounits"></div>
    <div id="mu">
      <span class="yl" id="ylbl" style="color:var(--ac)">▲ YOU</span>
      <span id="mltr">?</span>
      <span class="cl" id="clbl" style="color:var(--ac)">—</span>
    </div>
  </div>
  <div id="zbtns">
    <div class="zb" onclick="zoomIn()">+</div>
    <div class="zb" onclick="zoomOut()">−</div>
    <div class="zb" onclick="fitMap()" style="font-size:11px">FIT</div>
  </div>
  <div id="hint">DRAG TO PAN • TAP TO MOVE (YOUR TURN)</div>
</div>

<button id="cfm">✓ CONFIRM MOVE</button>

<div id="chat">
  <div id="cmsgs"></div>
  <div id="crow">
    <input id="cinput" placeholder="Type message…" maxlength="120"/>
    <button id="csend">SEND</button>
  </div>
</div>

<div id="qm">
  <div class="qbox">
    <h3>QUIT DTTX?</h3>
    <p>You will be disconnected.</p>
    <div class="qrow">
      <button class="qy" onclick="quitApp()">QUIT</button>
      <button class="qn" onclick="document.getElementById('qm').classList.remove('open')">CANCEL</button>
    </div>
  </div>
</div>

<script>
const params=new URLSearchParams(location.search);
const SID=params.get('session'), UID=params.get('unit');
function showErr(msg){document.getElementById('loading').style.display='none';document.getElementById('err').style.display='flex';document.getElementById('errmsg').textContent=msg;}
if(!SID||!UID)showErr('Invalid QR code.');

let db=null, allUnits={}, myUnit=null, turnId=null, isMyTurn=false;
let px=0.5, py=0.5, pending=false;
let iconBase=parseInt(localStorage.getItem('ib')||'44');
const COLORS=['#ff4444','#4488ff','#44ff88','#ffcc00','#ff88ff','#ff8800','#88ffff','#cccccc'];
function col(id){return COLORS[Math.abs((id||'x').charCodeAt((id||'x').length-1))%COLORS.length];}

// ── THEME ──
const THEMES={green:'#39ff6a,57,255,106',red:'#ff4444,255,68,68',blue:'#4488ff,68,136,255',yellow:'#ffcc00,255,204,0'};
function setTheme(name,el){
  const[ac,...rgb]=THEMES[name].split(',');
  document.documentElement.style.setProperty('--ac',ac);
  document.documentElement.style.setProperty('--acr',rgb.join(','));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  if(el)el.classList.add('on'); localStorage.setItem('th',name); drawUnits();
}
const st=localStorage.getItem('th');
if(st){const el=document.querySelector(`.tb[style*="${(THEMES[st]||'').split(',')[0]}"]`);setTheme(st,el);}
document.getElementById('szSlider').value=iconBase;

// ── DRAW ──
let drawMode=false, drawColor='#ff4444', drawSize=3;
let isDrawing=false, drawHistory=[], myDrawings=[];
const canvas=document.getElementById('drawCanvas');
const dctx=canvas.getContext('2d');

function toggleDraw(){
  drawMode=!drawMode;
  document.getElementById('dbar').classList.toggle('show',drawMode);
  document.getElementById('drawToggle').classList.toggle('on',drawMode);
  document.getElementById('hint').textContent=drawMode?'DRAWING MODE — TAP DRAW BUTTON TO EXIT':'DRAG TO PAN • TAP TO MOVE (YOUR TURN)';
}
function setDrawColor(el){
  drawColor=el.dataset.c;
  document.querySelectorAll('.dc').forEach(d=>d.classList.remove('on'));
  el.classList.add('on');
}
function undoDraw(){
  if(!myDrawings.length)return;
  myDrawings.pop();
  saveDrawings();
  redrawCanvas();
}
function clearMyDrawings(){
  myDrawings=[];
  saveDrawings();
  redrawCanvas();
}
function saveDrawings(){
  if(!db)return;
  db.ref(SID+'/drawings/'+UID).set(myDrawings.length?myDrawings:null);
}
function redrawCanvas(){
  dctx.clearRect(0,0,canvas.width,canvas.height);
  drawHistory.forEach(d=>renderStroke(d));
}
function renderStroke(d){
  if(!d.pts||d.pts.length<2)return;
  dctx.beginPath();
  dctx.strokeStyle=d.color;
  dctx.lineWidth=d.size;
  dctx.lineCap='round';
  dctx.lineJoin='round';
  dctx.moveTo(d.pts[0].x*canvas.width,d.pts[0].y*canvas.height);
  for(let i=1;i<d.pts.length;i++) dctx.lineTo(d.pts[i].x*canvas.width,d.pts[i].y*canvas.height);
  dctx.stroke();
}
function resizeCanvas(){
  const W=minner.offsetWidth, H=minner.offsetHeight;
  canvas.width=W; canvas.height=H;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  redrawCanvas();
}

// Draw touch/mouse on canvas
let currentStroke=null;
function drawStart(cx,cy){
  if(!drawMode)return false;
  const pos=s2m(cx,cy);
  currentStroke={color:drawColor,size:drawSize/sc,pts:[pos]};
  isDrawing=true;
  return true;
}
function drawMove(cx,cy){
  if(!isDrawing||!currentStroke)return;
  const pos=s2m(cx,cy);
  currentStroke.pts.push(pos);
  redrawCanvas();
  renderStroke(currentStroke);
}
function drawEnd(){
  if(!isDrawing||!currentStroke)return;
  if(currentStroke.pts.length>1){
    myDrawings.push(currentStroke);
    drawHistory.push(currentStroke);
    saveDrawings();
  }
  currentStroke=null;
  isDrawing=false;
}

// ── QUIT ──
function quitApp(){
  if(db)db.ref(SID+'/connections/'+UID).remove();
  document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0f0d;font-family:monospace;color:#ff4444;letter-spacing:2px">DISCONNECTED</div>';
}

// ── MAP & ZOOM ──
const mwrap=document.getElementById('mwrap');
const minner=document.getElementById('minner');
const mimg=document.getElementById('mimg');
let sc=1,tx=0,ty=0,pinching=false,lastDist=0;
let dragging=false,moved=false,sx0=0,sy0=0,tx0=0,ty0=0;
const THOLD=8;

mimg.onload=function(){minner.style.width=mimg.naturalWidth+'px';minner.style.height=mimg.naturalHeight+'px';fitMap();resizeCanvas();};
mimg.onerror=function(){minner.style.width=mwrap.clientWidth+'px';minner.style.height=mwrap.clientHeight+'px';fitMap();resizeCanvas();};

function applyT(){minner.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;}
function clamp(){
  const ww=mwrap.clientWidth,wh=mwrap.clientHeight;
  const iw=minner.offsetWidth*sc,ih=minner.offsetHeight*sc;
  tx=iw<=ww?(ww-iw)/2:Math.min(0,Math.max(tx,ww-iw));
  ty=ih<=wh?(wh-ih)/2:Math.min(0,Math.max(ty,wh-ih));
}
function fitMap(){
  const ww=mwrap.clientWidth,wh=mwrap.clientHeight;
  const iw=minner.offsetWidth,ih=minner.offsetHeight;
  if(!iw||!ih)return;
  sc=Math.min(ww/iw,wh/ih); tx=(ww-iw*sc)/2; ty=(wh-ih*sc)/2;
  applyT(); drawUnits();
}
function zoomAt(ns,cx,cy){
  const r=ns/sc; tx=cx-r*(cx-tx); ty=cy-r*(cy-ty);
  sc=Math.max(0.3,Math.min(8,ns)); clamp(); applyT(); drawUnits();
}
function zoomIn(){zoomAt(sc*1.4,mwrap.clientWidth/2,mwrap.clientHeight/2);}
function zoomOut(){zoomAt(sc/1.4,mwrap.clientWidth/2,mwrap.clientHeight/2);}

mwrap.addEventListener('touchstart',e=>{
  if(e.target.closest('#zbtns'))return;
  moved=false;
  if(e.touches.length===2){pinching=true;dragging=false;lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  else{
    dragging=true; sx0=e.touches[0].clientX; sy0=e.touches[0].clientY; tx0=tx; ty0=ty;
    if(drawMode) drawStart(e.touches[0].clientX,e.touches[0].clientY);
  }
},{passive:true});

mwrap.addEventListener('touchmove',e=>{
  if(e.target.closest('#zbtns'))return;
  e.preventDefault();
  if(e.touches.length===2&&pinching){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-mwrap.getBoundingClientRect().left;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2-mwrap.getBoundingClientRect().top;
    zoomAt(sc*d/lastDist,cx,cy); lastDist=d;
  }else if(e.touches.length===1){
    const dx=e.touches[0].clientX-sx0, dy=e.touches[0].clientY-sy0;
    if(Math.abs(dx)>THOLD||Math.abs(dy)>THOLD) moved=true;
    if(drawMode&&moved) drawMove(e.touches[0].clientX,e.touches[0].clientY);
    else if(!drawMode&&moved){tx=tx0+dx;ty=ty0+dy;clamp();applyT();}
  }
},{passive:false});

mwrap.addEventListener('touchend',e=>{
  pinching=false;
  if(drawMode){drawEnd();return;}
  if(!moved&&isMyTurn&&e.changedTouches.length===1){
    const t=e.changedTouches[0],p=s2m(t.clientX,t.clientY);
    setMove(p.x,p.y);
  }
},{passive:true});

mwrap.addEventListener('mousedown',e=>{
  if(e.target.closest('#zbtns'))return;
  dragging=true; moved=false; sx0=e.clientX; sy0=e.clientY; tx0=tx; ty0=ty;
  if(drawMode) drawStart(e.clientX,e.clientY);
});
mwrap.addEventListener('mousemove',e=>{
  if(!dragging||!e.buttons)return;
  const dx=e.clientX-sx0,dy=e.clientY-sy0;
  if(Math.abs(dx)>THOLD||Math.abs(dy)>THOLD) moved=true;
  if(drawMode&&moved) drawMove(e.clientX,e.clientY);
  else if(!drawMode&&moved){tx=tx0+dx;ty=ty0+dy;clamp();applyT();}
});
mwrap.addEventListener('mouseup',e=>{
  if(drawMode){drawEnd();dragging=false;return;}
  if(!moved&&isMyTurn){const p=s2m(e.clientX,e.clientY);setMove(p.x,p.y);}
  dragging=false;
});
mwrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=mwrap.getBoundingClientRect();
  zoomAt(sc*(e.deltaY>0?0.85:1.15),e.clientX-r.left,e.clientY-r.top);
},{passive:false});

function s2m(cx,cy){
  const r=mwrap.getBoundingClientRect();
  const W=minner.offsetWidth,H=minner.offsetHeight;
  return{x:Math.max(0.01,Math.min(0.99,(cx-r.left-tx)/sc/W)),y:Math.max(0.01,Math.min(0.99,(cy-r.top-ty)/sc/H))};
}

// ── DRAW UNITS ──
function drawUnits(){
  const W=minner.offsetWidth,H=minner.offsetHeight; if(!W||!H)return;
  const sz=Math.max(8,Math.round(iconBase/sc));
  const fz=Math.max(5,Math.round(iconBase*0.32/sc));
  const lf=Math.max(4,Math.round(iconBase*0.22/sc));
  const bw=Math.max(1,Math.round(2/sc));
  const gl=Math.max(3,Math.round(iconBase*0.35/sc));
  const ac=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim();
  const mu=document.getElementById('mu');
  const ux=pending?px:(myUnit?myUnit.x:0.5), uy=pending?py:(myUnit?myUnit.y:0.5);
  const msz=Math.max(10,Math.round((iconBase+10)/sc));
  const mfz=Math.max(6,Math.round(iconBase*0.36/sc));
  const mlf=Math.max(4,Math.round(iconBase*0.22/sc));
  // Use custom icon color if set by host
  const myColor=myUnit&&myUnit.iconColor?myUnit.iconColor:col(UID);
  mu.style.cssText=`left:${ux*W}px;top:${uy*H}px;width:${msz}px;height:${msz}px;font-size:${mfz}px;background:${myColor};border:${bw+1}px solid ${ac};box-shadow:0 0 ${gl}px ${ac},0 0 ${gl*2}px ${ac}55;`;
  document.getElementById('ylbl').style.fontSize=mlf+'px';
  document.getElementById('clbl').style.fontSize=mlf+'px';
  const cont=document.getElementById('ounits'); cont.innerHTML='';
  Object.entries(allUnits).forEach(([k,u])=>{
    if(!u)return; const id=u.id||k; if(id===UID)return;
    const isAct=id===turnId;
    const c=u.iconColor||col(id);
    const d=document.createElement('div'); d.className='um';
    d.style.cssText=`left:${u.x*W}px;top:${u.y*H}px;width:${sz}px;height:${sz}px;font-size:${fz}px;background:${c};border:${bw}px solid ${isAct?'#ffaa00':c+'aa'};box-shadow:0 0 ${isAct?gl*1.5:gl*0.5}px ${isAct?'#ffaa00':c+'88'};opacity:${isAct?1:0.85};`;
    d.innerHTML=`<span style="font-weight:700;color:#000;line-height:1">${(u.callsign||'?')[0]}</span><div class="ul" style="font-size:${lf}px">${u.callsign||''}</div>`;
    cont.appendChild(d);
  });
}

function setMove(x,y){
  px=x;py=y;pending=true;
  document.getElementById('cfm').style.display='block';
  document.getElementById('hint').textContent='TAP CONFIRM TO SEND';
  document.getElementById('hint').className='hint on';
  drawUnits();
}
function updateBanner(){
  const banner=document.getElementById('banner'), cu=allUnits[turnId];
  if(isMyTurn){
    banner.className='yt'; banner.textContent='▶ YOUR TURN — TAP MAP TO MOVE';
    document.getElementById('hint').className='hint on';
    document.getElementById('hint').textContent='TAP TO PLACE • DRAW BUTTON TO DRAW';
  }else{
    banner.className=''; banner.textContent=`WAITING — ${cu?cu.callsign:'—'} IS MOVING`;
    document.getElementById('hint').className='hint';
    document.getElementById('hint').textContent='DRAG TO PAN • PINCH TO ZOOM';
    pending=false; document.getElementById('cfm').style.display='none';
  }
  drawUnits();
}

// ── CONFIRM ──
document.getElementById('cfm').onclick=function(){
  if(!pending||!db)return;
  db.ref(SID+'/units/'+UID).update({x:px,y:py});
  if(allUnits[UID]){allUnits[UID].x=px;allUnits[UID].y=py;}
  pending=false; this.style.display='none';
  document.getElementById('banner').className='';
  document.getElementById('banner').textContent='✓ MOVE SENT — WAITING FOR NEXT TURN';
  document.getElementById('hint').className='hint';
  document.getElementById('hint').textContent='DRAG TO PAN • PINCH TO ZOOM';
  drawUnits();
};

// ── CHAT ──
function addMsg(m){
  const msgs=document.getElementById('cmsgs'), d=document.createElement('div'); d.className='cm';
  const t=new Date(m.ts), ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  d.innerHTML=`<span class="cs${m.isHost?' h':''}">${m.sender}</span> <span>${m.text}</span><span class="ct">${ts}</span>`;
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}
document.getElementById('csend').onclick=sendChat;
document.getElementById('cinput').onkeydown=e=>{if(e.key==='Enter')sendChat();};
function sendChat(){
  const inp=document.getElementById('cinput'), txt=inp.value.trim();
  if(!txt||!myUnit)return;
  db.ref(SID+'/chat').push({sender:myUnit.callsign||myUnit.name,isHost:false,text:txt,ts:Date.now()});
  inp.value='';
}

window.addEventListener('resize',()=>{fitMap();resizeCanvas();});

// ── FIREBASE ──
if(SID&&UID){
  try{
    const app=firebase.initializeApp({
      apiKey:"AIzaSyAbKI8JQ4VoZ6pr7UrSl_ovk10f0dx1AsU",
      authDomain:"dttx-98e49.firebaseapp.com",
      databaseURL:"https://dttx-98e49-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:"dttx-98e49",
      storageBucket:"dttx-98e49.firebasestorage.app",
      messagingSenderId:"42966455501",
      appId:"1:42966455501:web:857c386cbbad3269e34584"
    },'p'+Date.now());
    db=firebase.database(app);
  }catch(e){showErr('Firebase error: '+e.message);}

  db.ref('.info/connected').on('value',snap=>{
    document.getElementById('dot').className='dot'+(snap.val()?' live':'');
    if(snap.val()){db.ref(SID+'/connections/'+UID).set(true);db.ref(SID+'/connections/'+UID).onDisconnect().remove();}
  });
  db.ref(SID+'/units').on('value',snap=>{
    const data=snap.val();
    if(!data){showErr('Session not found. Make sure host started session.');return;}
    allUnits=data; myUnit=data[UID];
    if(!myUnit){showErr('Unit not found. Ask host to regenerate QR codes.');return;}
    document.getElementById('loading').style.display='none';
    document.getElementById('badge').textContent=myUnit.name||'—';
    document.getElementById('mltr').textContent=(myUnit.callsign||'?')[0];
    document.getElementById('clbl').textContent=myUnit.callsign||'';
    drawUnits();
  });
  db.ref(SID+'/turn').on('value',snap=>{
    const t=snap.val(); if(!t)return;
    turnId=t.activeUnitId; isMyTurn=turnId===UID;
    updateBanner(); drawUnits();
  });
  db.ref(SID+'/chat').limitToLast(50).on('child_added',snap=>{const m=snap.val();if(m)addMsg(m);});
  // Listen for brightness
  db.ref(SID+'/meta/brightness').on('value',snap=>{
    const val=snap.val();
    if(val!==null) document.getElementById('mimg').style.filter=`brightness(${val})`;
  });

  // Listen for drawings from all players - PERSIST until cleared
  db.ref(SID+'/drawings').on('value',snap=>{
    const all=snap.val()||{};
    drawHistory=[];
    Object.values(all).forEach(strokes=>{if(Array.isArray(strokes))drawHistory.push(...strokes);});
    redrawCanvas();
  });
  setTimeout(()=>{if(document.getElementById('loading').style.display!=='none')showErr('Timed out. Check internet and try again.');},15000);
}
