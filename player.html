<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>TACMAP — Unit View</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { height: 100%; overflow: hidden; background: #0a0f0d; color: #c8e6c9; font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; }
    header { background: #111a14; border-bottom: 1px solid #1f3a24; padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .logo { font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #39ff6a; letter-spacing: 3px; }
    .unit-badge { background: rgba(57,255,106,0.1); border: 1px solid #1f3a24; padding: 4px 10px; font-size: 14px; font-weight: 700; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #4a6950; margin-left: auto; }
    .dot.live { background: #39ff6a; box-shadow: 0 0 6px #39ff6a; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    #turn-banner { padding: 10px; text-align: center; font-size: 14px; font-weight: 700; letter-spacing: 1px; background: #111a14; border-bottom: 1px solid #1f3a24; color: #4a6950; flex-shrink: 0; }
    #turn-banner.your-turn { background: rgba(57,255,106,0.15); border-bottom-color: #39ff6a; color: #39ff6a; animation: glow 1.5s infinite; }
    @keyframes glow { 0%,100%{box-shadow:inset 0 0 10px rgba(57,255,106,0.1)}50%{box-shadow:inset 0 0 25px rgba(57,255,106,0.25)} }

    #map-wrap { flex: 1; position: relative; overflow: hidden; background: #0e1a10; touch-action: none; }

    /* Panning/zoom container */
    #map-inner { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
    #map-img { display: block; width: 100%; height: 100%; object-fit: cover; }

    /* Grid overlay */
    #map-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(57,255,106,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(57,255,106,0.04) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; }

    .unit-marker { position: absolute; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #000; border: 2px solid rgba(255,255,255,0.3); transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
    .unit-marker .unit-label { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); font-size: 10px; color: #eee; white-space: nowrap; margin-top: 3px; font-family: 'Share Tech Mono', monospace; text-shadow: 0 0 4px #000, 0 0 4px #000; }

    #my-unit { position: absolute; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: #000; border: 3px solid #fff; transform: translate(-50%, -50%); z-index: 10; cursor: grab; box-shadow: 0 0 20px rgba(57,255,106,0.6); }
    #my-unit .you-label { position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); font-size: 10px; color: #39ff6a; white-space: nowrap; font-family: 'Share Tech Mono', monospace; letter-spacing: 1px; text-shadow: 0 0 4px #000; }
    #my-unit .callsign-label { position: absolute; top: 110%; left: 50%; transform: translateX(-50%); font-size: 10px; color: #39ff6a; white-space: nowrap; font-family: 'Share Tech Mono', monospace; text-shadow: 0 0 4px #000; }

    /* Zoom buttons */
    #zoom-btns { position: absolute; right: 10px; bottom: 10px; display: flex; flex-direction: column; gap: 6px; z-index: 20; pointer-events: all; }
    .zoom-btn { width: 40px; height: 40px; background: rgba(17,26,20,0.9); border: 1px solid #1f3a24; color: #39ff6a; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; touch-action: manipulation; }
    .zoom-btn:active { background: rgba(57,255,106,0.2); }

    #tap-hint { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(10,15,13,0.85); border: 1px solid #1f3a24; padding: 6px 14px; font-size: 11px; color: #4a6950; font-family: 'Share Tech Mono', monospace; white-space: nowrap; z-index: 20; pointer-events: none; border-radius: 2px; }
    #tap-hint.active { border-color: #39ff6a; color: #39ff6a; }

    #confirm-btn { display: none; width: 100%; padding: 16px; background: #39ff6a; color: #000; border: none; font-size: 18px; font-weight: 700; font-family: 'Rajdhani', sans-serif; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 20px rgba(57,255,106,0.4); touch-action: manipulation; flex-shrink: 0; }
    #status-bar { background: #111a14; border-top: 1px solid #1f3a24; padding: 8px 14px; display: flex; justify-content: space-between; font-size: 12px; flex-shrink: 0; }
    .si { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .sl { font-size: 9px; color: #4a6950; letter-spacing: 1px; text-transform: uppercase; }
    .sv { font-family: 'Share Tech Mono', monospace; font-size: 12px; }
    .sv.accent { color: #39ff6a; }

    #loading { position: fixed; inset: 0; background: #0a0f0d; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 999; }
    .spinner { width: 40px; height: 40px; border: 2px solid #1f3a24; border-top-color: #39ff6a; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #4a6950; }
    #error-screen { position: fixed; inset: 0; background: #0a0f0d; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 24px; text-align: center; z-index: 999; }
    #error-screen h2 { color: #ff4444; font-size: 20px; }
    #error-screen p { color: #4a6950; font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>CONNECTING TO TACMAP…</p></div>
<div id="error-screen"><h2>⚠ ERROR</h2><p id="error-msg">Could not connect.</p></div>

<header>
  <div class="logo">⬡ TACMAP</div>
  <div class="unit-badge" id="unit-badge">—</div>
  <div class="dot" id="conn-dot"></div>
</header>

<div id="turn-banner">WAITING FOR TURN…</div>

<div id="map-wrap">
  <div id="map-inner">
    <img id="map-img" src="" alt="map" style="display:none"/>
    <div id="map-grid"></div>
    <div id="other-units"></div>
    <div id="my-unit">
      <span class="you-label">▲ YOU</span>
      <span id="my-letter">?</span>
      <span class="callsign-label" id="my-callsign-lbl">—</span>
    </div>
  </div>
  <div id="zoom-btns">
    <div class="zoom-btn" ontouchstart="zoomIn()" onclick="zoomIn()">+</div>
    <div class="zoom-btn" ontouchstart="zoomOut()" onclick="zoomOut()">−</div>
    <div class="zoom-btn" ontouchstart="zoomReset()" onclick="zoomReset()" style="font-size:14px">FIT</div>
  </div>
  <div id="tap-hint">TAP MAP TO MOVE YOUR UNIT</div>
</div>

<button id="confirm-btn" onclick="confirmMove()">✓ CONFIRM MOVE</button>
<div id="status-bar">
  <div class="si"><span class="sl">Unit</span><span class="sv accent" id="sb-unit">—</span></div>
  <div class="si"><span class="sl">Callsign</span><span class="sv" id="sb-callsign">—</span></div>
  <div class="si"><span class="sl">Status</span><span class="sv" id="sb-status">OFFLINE</span></div>
  <div class="si"><span class="sl">Turn</span><span class="sv" id="sb-turn">—</span></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session');
const myUnitId = params.get('unit');
if (!sessionId || !myUnitId) showError('Invalid QR code.');

const firebaseConfig = {
  apiKey: "AIzaSyAbKI8JQ4VoZ6pr7UrSl_ovk10f0dx1AsU",
  authDomain: "dttx-98e49.firebaseapp.com",
  databaseURL: "https://dttx-98e49-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dttx-98e49",
  storageBucket: "dttx-98e49.firebasestorage.app",
  messagingSenderId: "42966455501",
  appId: "1:42966455101:web:857c386cbbad3269e34584"
};

let db, allUnits = {}, myUnit = null, currentTurnUnitId = null, isMyTurn = false;
let pendingX = null, pendingY = null, hasPendingMove = false;
const unitColors = ['#ff4444','#4488ff','#44ff88','#ffcc00','#ff88ff','#ff8800','#88ffff','#cccccc'];
function getColor(id) { return unitColors[Math.abs((id||'').charCodeAt((id||'').length-1)||0) % unitColors.length]; }

// ═══════════════════════════════════════
// ZOOM & PAN
// ═══════════════════════════════════════
const mapWrap = document.getElementById('map-wrap');
const mapInner = document.getElementById('map-inner');
let scale = 1, panX = 0, panY = 0;
let lastPinchDist = 0, isPinching = false;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPX = 0, panStartPY = 0;

function applyTransform() {
  mapInner.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  renderAllUnits(); // resize icons when zoom changes
}

function clampPan() {
  const wW = mapWrap.clientWidth, wH = mapWrap.clientHeight;
  const iW = mapInner.offsetWidth * scale, iH = mapInner.offsetHeight * scale;
  panX = Math.min(0, Math.max(panX, wW - iW));
  panY = Math.min(0, Math.max(panY, wH - iH));
}

function zoomAt(newScale, cx, cy) {
  const ratio = newScale / scale;
  panX = cx - ratio * (cx - panX);
  panY = cy - ratio * (cy - panY);
  scale = newScale;
  clampPan();
  applyTransform();
  renderAllUnits();
}

function zoomIn() { zoomAt(Math.min(scale * 1.4, 6), mapWrap.clientWidth/2, mapWrap.clientHeight/2); }
function zoomOut() { zoomAt(Math.max(scale / 1.4, 0.5), mapWrap.clientWidth/2, mapWrap.clientHeight/2); }
function zoomReset() { scale = 1; panX = 0; panY = 0; applyTransform(); renderAllUnits(); }

function initMapSize() {
  mapInner.style.width = mapWrap.clientWidth + 'px';
  mapInner.style.height = mapWrap.clientHeight + 'px';
  applyTransform();
}

// Convert screen coords to map-inner relative coords (0-1)
function screenToMap(clientX, clientY) {
  const rect = mapWrap.getBoundingClientRect();
  const lx = (clientX - rect.left - panX) / scale;
  const ly = (clientY - rect.top - panY) / scale;
  const W = mapInner.offsetWidth, H = mapInner.offsetHeight;
  return { x: Math.max(0.01, Math.min(0.99, lx/W)), y: Math.max(0.01, Math.min(0.99, ly/H)) };
}

// Touch events for pan + pinch zoom
let touchMoved = false;
mapWrap.addEventListener('touchstart', e => {
  if (e.target.closest('#zoom-btns')) return;
  touchMoved = false;
  if (e.touches.length === 2) {
    isPinching = true; isPanning = false;
    lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  } else if (e.touches.length === 1) {
    isPanning = true;
    panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
    panStartPX = panX; panStartPY = panY;
  }
}, { passive: true });

mapWrap.addEventListener('touchmove', e => {
  if (e.target.closest('#zoom-btns')) return;
  e.preventDefault();
  touchMoved = true;
  if (e.touches.length === 2 && isPinching) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const rect = mapWrap.getBoundingClientRect();
    zoomAt(Math.max(0.5, Math.min(6, scale * dist / lastPinchDist)), cx - rect.left, cy - rect.top);
    lastPinchDist = dist;
  } else if (e.touches.length === 1 && isPanning && !isMyTurn) {
    panX = panStartPX + (e.touches[0].clientX - panStartX);
    panY = panStartPY + (e.touches[0].clientY - panStartY);
    clampPan(); applyTransform();
  } else if (e.touches.length === 1 && isMyTurn && !isPinching) {
    // Move unit while dragging
    const pos = screenToMap(e.touches[0].clientX, e.touches[0].clientY);
    setPendingMove(pos.x, pos.y);
  }
}, { passive: false });

mapWrap.addEventListener('touchend', e => {
  if (e.target.closest('#zoom-btns')) return;
  isPinching = false;
  if (e.changedTouches.length === 1 && isMyTurn && !touchMoved) {
    // Single tap = move unit here
    const t = e.changedTouches[0];
    const pos = screenToMap(t.clientX, t.clientY);
    setPendingMove(pos.x, pos.y);
  }
  if (e.touches.length < 2) isPanning = true;
}, { passive: true });

// Mouse support
mapWrap.addEventListener('mousedown', e => {
  if (e.target.closest('#zoom-btns')) return;
  isPanning = true;
  panStartX = e.clientX; panStartY = e.clientY;
  panStartPX = panX; panStartPY = panY;
  touchMoved = false;
});
mapWrap.addEventListener('mousemove', e => {
  if (!isPanning) return;
  touchMoved = true;
  if (isMyTurn) {
    const pos = screenToMap(e.clientX, e.clientY);
    if (e.buttons === 1) setPendingMove(pos.x, pos.y);
  } else if (e.buttons === 1) {
    panX = panStartPX + (e.clientX - panStartX);
    panY = panStartPY + (e.clientY - panStartY);
    clampPan(); applyTransform();
  }
});
mapWrap.addEventListener('mouseup', e => {
  if (!touchMoved && isMyTurn) {
    const pos = screenToMap(e.clientX, e.clientY);
    setPendingMove(pos.x, pos.y);
  }
  isPanning = false;
});
mapWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = mapWrap.getBoundingClientRect();
  zoomAt(Math.max(0.5, Math.min(6, scale * (e.deltaY > 0 ? 0.85 : 1.15))), e.clientX - rect.left, e.clientY - rect.top);
}, { passive: false });

// ═══════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════
function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-screen').style.display = 'flex';
  document.getElementById('error-msg').textContent = msg;
}

function init() {
  try {
    const app = firebase.initializeApp(firebaseConfig, 'player_' + Date.now());
    db = firebase.database(app);
  } catch(e) { showError('Firebase error: ' + e.message); return; }

  db.ref('.info/connected').on('value', snap => {
    const ok = snap.val();
    document.getElementById('conn-dot').className = 'dot' + (ok ? ' live' : '');
    document.getElementById('sb-status').textContent = ok ? 'LIVE' : 'RECONNECT';
    if (ok) {
      db.ref(sessionId + '/connections/' + myUnitId).set(true);
      db.ref(sessionId + '/connections/' + myUnitId).onDisconnect().remove();
    }
  });

  // Load map image URL from Firebase
  db.ref(sessionId + '/meta/mapUrl').on('value', snap => {
    const url = snap.val();
    const img = document.getElementById('map-img');
    if (url) { img.src = url; img.style.display = 'block'; }
    else { img.style.display = 'none'; }
  });

  db.ref(sessionId + '/units').on('value', snap => {
    const data = snap.val();
    if (!data) { showError('Session not found.'); return; }
    allUnits = data;
    myUnit = data[myUnitId];
    if (!myUnit) { showError('Unit not found. Ask host to reshare QR.'); return; }
    document.getElementById('loading').style.display = 'none';
    initMapSize();
    renderAllUnits();
    updateMyUnitInfo();
  });

  db.ref(sessionId + '/turn').on('value', snap => {
    const turn = snap.val();
    if (!turn) return;
    currentTurnUnitId = turn.activeUnitId;
    isMyTurn = currentTurnUnitId === myUnitId;
    updateTurnBanner();
    renderAllUnits();
  });
}

function updateMyUnitInfo() {
  if (!myUnit) return;
  document.getElementById('unit-badge').textContent = myUnit.name || '—';
  document.getElementById('sb-unit').textContent = myUnit.name || '—';
  document.getElementById('sb-callsign').textContent = myUnit.callsign || '—';
  document.getElementById('my-letter').textContent = (myUnit.callsign || '?')[0];
  document.getElementById('my-callsign-lbl').textContent = myUnit.callsign || '';
  document.getElementById('my-unit').style.background = getColor(myUnitId);
}

function renderAllUnits() {
  const W = mapInner.offsetWidth, H = mapInner.offsetHeight;
  if (!W || !H) return;

  // Icon size scales inversely with zoom so they appear same physical size on screen
  // At scale=1: 44px. At scale=2: 22px (half, so screen size stays ~44px)
  const BASE = 44;
  const iconSize = Math.round(BASE / scale);
  const fontSize = Math.round(13 / scale);
  const labelFont = Math.round(10 / scale);
  const borderW = Math.max(1, Math.round(2 / scale));

  // My unit
  if (myUnit) {
    const x = hasPendingMove ? pendingX : myUnit.x;
    const y = hasPendingMove ? pendingY : myUnit.y;
    const el = document.getElementById('my-unit');
    const mySize = Math.round((BASE + 10) / scale);
    const myFont = Math.round(16 / scale);
    const labelFontS = Math.round(10 / scale);
    el.style.left = (x * W) + 'px';
    el.style.top = (y * H) + 'px';
    el.style.width = mySize + 'px';
    el.style.height = mySize + 'px';
    el.style.fontSize = myFont + 'px';
    el.style.borderWidth = Math.max(1, Math.round(3/scale)) + 'px';
    // Scale labels too
    const youLbl = el.querySelector('.you-label');
    const csLbl = el.querySelector('.callsign-label');
    if (youLbl) youLbl.style.fontSize = labelFontS + 'px';
    if (csLbl) csLbl.style.fontSize = labelFontS + 'px';
  }

  // Other units
  const container = document.getElementById('other-units');
  container.innerHTML = '';
  Object.entries(allUnits).forEach(([key, u]) => {
    if (!u) return;
    const uid = u.id || key;
    if (uid === myUnitId) return;
    const isActive = uid === currentTurnUnitId;
    const div = document.createElement('div');
    div.className = 'unit-marker';
    div.style.cssText = `
      left:${u.x*W}px;top:${u.y*H}px;
      background:${getColor(uid)};
      opacity:${isActive?'1':'0.8'};
      border:${borderW}px solid ${isActive?'#ffaa00':'rgba(255,255,255,0.3)'};
      box-shadow:${isActive?`0 0 ${Math.round(14/scale)}px rgba(255,170,0,0.7)`:'none'};
      width:${iconSize}px;height:${iconSize}px;
      border-radius:50%;
      position:absolute;
      display:flex;align-items:center;justify-content:center;
      transform:translate(-50%,-50%);
      pointer-events:none;
    `;
    div.innerHTML = `<span style="font-weight:700;font-size:${fontSize}px;color:#000;line-height:1">${(u.callsign||'?')[0]}</span><div style="position:absolute;top:100%;left:50%;transform:translateX(-50%);font-size:${labelFont}px;color:#eee;white-space:nowrap;margin-top:${Math.round(3/scale)}px;font-family:'Share Tech Mono',monospace;text-shadow:0 0 4px #000">${u.callsign||''}</div>`;
    container.appendChild(div);
  });
}

function setPendingMove(x, y) {
  pendingX = x; pendingY = y;
  hasPendingMove = true;
  document.getElementById('confirm-btn').style.display = 'block';
  document.getElementById('tap-hint').textContent = 'TAP CONFIRM TO SEND';
  document.getElementById('tap-hint').className = 'active';
  renderAllUnits();
}

function updateTurnBanner() {
  const banner = document.getElementById('turn-banner');
  const currentUnit = allUnits[currentTurnUnitId];
  if (isMyTurn) {
    banner.className = 'your-turn';
    banner.textContent = '▶ YOUR TURN — TAP MAP TO MOVE';
    document.getElementById('tap-hint').className = 'active';
    document.getElementById('tap-hint').textContent = 'TAP ANYWHERE TO PLACE YOUR UNIT';
    document.getElementById('sb-turn').textContent = 'YOURS';
  } else {
    banner.className = '';
    banner.textContent = `WAITING — ${currentUnit ? currentUnit.callsign : '—'} IS MOVING`;
    document.getElementById('tap-hint').className = '';
    document.getElementById('tap-hint').textContent = 'STAND BY…';
    document.getElementById('sb-turn').textContent = currentUnit ? currentUnit.callsign : '—';
    hasPendingMove = false;
    document.getElementById('confirm-btn').style.display = 'none';
    renderAllUnits();
  }
}

function confirmMove() {
  if (!hasPendingMove || !db) return;
  db.ref(sessionId + '/units/' + myUnitId).update({ x: pendingX, y: pendingY });
  if (allUnits[myUnitId]) { allUnits[myUnitId].x = pendingX; allUnits[myUnitId].y = pendingY; }
  hasPendingMove = false;
  document.getElementById('confirm-btn').style.display = 'none';
  document.getElementById('turn-banner').className = '';
  document.getElementById('turn-banner').textContent = '✓ MOVE SENT — WAITING FOR NEXT TURN';
  document.getElementById('tap-hint').textContent = 'MOVE CONFIRMED';
  document.getElementById('tap-hint').className = '';
  renderAllUnits();
}

window.addEventListener('resize', () => { initMapSize(); renderAllUnits(); });
if (sessionId && myUnitId) init();
</script>
</body>
</html>
