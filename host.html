<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TACMAP HOST</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root{--ac:#39ff6a;--bg:#0a0f0d;--sf:#111a14;--bd:#1f3a24;--dm:#4a6950;--text:#c8e6c9;--warn:#ffaa00;--danger:#ff4444;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;height:100vh;overflow:hidden;display:grid;grid-template-rows:48px 1fr;grid-template-columns:1fr 280px;}
    header{grid-column:1/-1;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px;}
    .logo{font-family:monospace;font-size:16px;color:var(--ac);letter-spacing:4px;}
    .hdot{width:8px;height:8px;border-radius:50%;background:var(--dm);}
    .hdot.live{background:var(--ac);box-shadow:0 0 6px var(--ac);}
    #sess-lbl{font-family:monospace;font-size:12px;color:var(--ac);margin-left:auto;}
    .hbtn{background:transparent;border:1px solid var(--ac);color:var(--ac);padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-left:8px;}
    .hbtn:hover{background:var(--ac);color:var(--bg);}
    /* MAP */
    #map-wrap{position:relative;overflow:hidden;background:#111;}
    #map-wrap::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(57,255,106,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,106,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
    #map-canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
    /* SIDEBAR */
    #sidebar{background:var(--sf);display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--bd);}
    .sec{border-bottom:1px solid var(--bd);}
    .sec-h{padding:10px 12px;font-size:10px;letter-spacing:2px;color:var(--dm);cursor:pointer;display:flex;justify-content:space-between;text-transform:uppercase;}
    .sec-h:hover{color:var(--text);}
    .sec-b{display:none;padding:0 12px 12px;}
    .sec.open .sec-b{display:block;}
    .btn{display:block;width:100%;padding:7px;background:transparent;border:1px solid var(--ac);color:var(--ac);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-bottom:5px;}
    .btn:hover{background:var(--ac);color:var(--bg);}
    .btn.warn{border-color:var(--warn);color:var(--warn);}
    .btn.warn:hover{background:var(--warn);color:var(--bg);}
    .btn.danger{border-color:var(--danger);color:var(--danger);}
    .btn.danger:hover{background:var(--danger);color:#fff;}
    #turn-disp{font-family:monospace;font-size:14px;color:var(--ac);margin-bottom:8px;}
    input[type=text],input[type=range]{width:100%;background:var(--bg);border:1px solid var(--bd);color:var(--text);padding:5px 8px;font-size:13px;outline:none;margin-bottom:5px;}
    input[type=range]{padding:0;border:none;accent-color:var(--ac);}
    #units-list{flex:1;overflow-y:auto;padding:8px;}
    .ui{display:flex;align-items:center;gap:8px;padding:7px 8px;border:1px solid var(--bd);margin-bottom:5px;cursor:pointer;}
    .ui.active{border-color:var(--ac);}
    .ui-info{flex:1;min-width:0;}
    .ui-name{font-size:13px;font-weight:700;border:none;background:transparent;color:var(--text);width:100%;outline:none;}
    .ui-cs{font-size:10px;font-family:monospace;color:var(--dm);border:none;background:transparent;color:var(--dm);width:100%;outline:none;}
    .ui-dot{width:7px;height:7px;border-radius:50%;background:var(--dm);flex-shrink:0;}
    .ui-dot.on{background:var(--ac);box-shadow:0 0 4px var(--ac);}
    .ui-del{background:none;border:none;color:var(--dm);cursor:pointer;font-size:13px;padding:0 2px;}
    #log{font-family:monospace;font-size:10px;padding:8px;height:100px;overflow-y:auto;border-top:1px solid var(--bd);}
    .le{margin-bottom:3px;color:var(--dm);}
    .le span{color:var(--ac);}
    /* CHAT */
    #chat-box{border-top:1px solid var(--bd);flex-shrink:0;}
    #chat-msgs{height:80px;overflow-y:auto;padding:5px 8px;font-size:11px;}
    .cm{margin-bottom:3px;}
    .cs{font-family:monospace;font-size:9px;color:var(--ac);}
    .cs.h{color:var(--warn);}
    #chat-row{display:flex;border-top:1px solid var(--bd);}
    #chat-in{flex:1;background:transparent;border:none;color:var(--text);padding:6px 8px;font-size:12px;outline:none;}
    #chat-send{background:var(--ac);border:none;color:var(--bg);padding:6px 10px;font-weight:700;cursor:pointer;font-size:11px;}
    /* QR MODAL */
    #qr-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center;}
    #qr-modal.open{display:flex;}
    .qm-box{background:var(--sf);border:1px solid var(--bd);padding:20px;max-width:600px;max-height:90vh;overflow-y:auto;}
    .qm-box h2{color:var(--ac);font-size:16px;letter-spacing:2px;margin-bottom:4px;}
    .qm-box p{font-size:11px;color:var(--dm);margin-bottom:14px;}
    .qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .qr-card{background:var(--bg);border:1px solid var(--bd);padding:10px;text-align:center;}
    .qr-card h4{font-size:12px;margin-bottom:6px;}
    .qr-url{font-family:monospace;font-size:8px;color:var(--dm);word-break:break-all;margin-top:4px;}
    .close-btn{float:right;background:none;border:1px solid var(--dm);color:var(--dm);padding:3px 8px;cursor:pointer;margin-bottom:10px;}
    /* SETUP */
    #setup{display:flex;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;align-items:center;justify-content:center;}
    .setup-box{background:var(--sf);border:1px solid var(--ac);padding:28px;width:400px;}
    .setup-box h2{color:var(--ac);letter-spacing:3px;font-size:20px;margin-bottom:4px;}
    .setup-box p{color:var(--dm);font-size:12px;margin-bottom:20px;}
    label{display:block;font-size:10px;color:var(--dm);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase;}
    .row{display:flex;gap:8px;margin-top:12px;}
    .row .btn{margin:0;}
  </style>
</head>
<body>

<header>
  <div class="logo">⬡ TACMAP</div>
  <span style="font-size:12px;color:var(--dm)">COMMAND CENTER</span>
  <div class="hdot" id="hdot"></div>
  <span id="sess-lbl">SESSION: —</span>
  <button class="hbtn" onclick="showQR()">📱 QR CODES</button>
</header>

<div id="map-wrap">
  <canvas id="map-canvas"></canvas>
</div>

<div id="sidebar">
  <div class="sec open">
    <div class="sec-h" onclick="this.parentElement.classList.toggle('open')">Turn Control <span>▾</span></div>
    <div class="sec-b">
      <div id="turn-disp">— WAITING —</div>
      <button class="btn" onclick="nextTurn()">▶ NEXT TURN</button>
      <button class="btn warn" onclick="resetTurns()">↺ RESET TURNS</button>
      <button class="btn danger" onclick="resetSession()">⚠ RESET SESSION</button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-h" onclick="this.parentElement.classList.toggle('open')">Map Controls <span>▸</span></div>
    <div class="sec-b">
      <input type="file" id="map-file" accept="image/*" style="display:none" onchange="uploadMap(event)"/>
      <button class="btn" onclick="document.getElementById('map-file').click()">📁 UPLOAD MAP</button>
      <button class="btn warn" onclick="clearMap()">✕ CLEAR MAP</button>
      <div style="font-size:10px;color:var(--dm);margin:6px 0 3px">BRIGHTNESS</div>
      <input type="range" id="bright" min="0.1" max="1" step="0.05" value="1" oninput="setBrightness(this.value)"/>
    </div>
  </div>

  <div class="sec">
    <div class="sec-h" onclick="this.parentElement.classList.toggle('open')">Draw on Map <span>▸</span></div>
    <div class="sec-b">
      <div style="display:flex;gap:5px;margin-bottom:8px;align-items:center">
        <div style="width:20px;height:20px;border-radius:50%;background:#ff4444;cursor:pointer;border:2px solid #fff" onclick="hdc('#ff4444',this)"></div>
        <div style="width:20px;height:20px;border-radius:50%;background:#39ff6a;cursor:pointer;border:2px solid transparent" onclick="hdc('#39ff6a',this)"></div>
        <div style="width:20px;height:20px;border-radius:50%;background:#4488ff;cursor:pointer;border:2px solid transparent" onclick="hdc('#4488ff',this)"></div>
        <div style="width:20px;height:20px;border-radius:50%;background:#ffcc00;cursor:pointer;border:2px solid transparent" onclick="hdc('#ffcc00',this)"></div>
        <input type="range" min="1" max="20" value="3" style="flex:1" oninput="hds=+this.value"/>
      </div>
      <button class="btn" id="hdrawbtn" onclick="toggleDraw()">✏ DRAW: OFF</button>
      <button class="btn warn" onclick="clearAllDrawings()">🗑 CLEAR ALL DRAWINGS</button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-h" onclick="this.parentElement.classList.toggle('open')">Add Unit <span>▸</span></div>
    <div class="sec-b">
      <input type="text" id="uname" placeholder="Unit name"/>
      <input type="text" id="ucs" placeholder="Callsign (e.g. ALPHA-1)"/>
      <button class="btn" onclick="addUnit()">+ ADD UNIT</button>
    </div>
  </div>

  <div id="units-list"></div>

  <div id="log"></div>

  <div id="chat-box">
    <div style="padding:4px 8px;font-size:9px;color:var(--dm);letter-spacing:1px;border-bottom:1px solid var(--bd)">COMMS</div>
    <div id="chat-msgs"></div>
    <div id="chat-row">
      <input id="chat-in" placeholder="Broadcast message…" maxlength="120" onkeydown="if(event.key==='Enter')sendChat()"/>
      <button id="chat-send" onclick="sendChat()">SEND</button>
    </div>
  </div>
</div>

<div id="qr-modal">
  <div class="qm-box">
    <button class="close-btn" onclick="document.getElementById('qr-modal').classList.remove('open')">✕ CLOSE</button>
    <h2>UNIT QR CODES</h2>
    <p>Each participant scans their unit's QR code.</p>
    <div class="qr-grid" id="qr-grid"></div>
  </div>
</div>

<div id="setup">
  <div class="setup-box">
    <h2>TACMAP</h2>
    <p>Military Tabletop Exercise System</p>
    <label>Session Name</label>
    <input type="text" id="sname" value="EXERCISE TACMAP" style="margin-bottom:12px"/>
    <div class="row">
      <button class="btn" onclick="startSession()">⚡ START SESSION</button>
      <button class="btn warn" onclick="demoMode()">🖥 DEMO</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const FB = {
  apiKey:"AIzaSyAbKI8JQ4VoZ6pr7UrSl_ovk10f0dx1AsU",
  authDomain:"dttx-98e49.firebaseapp.com",
  databaseURL:"https://dttx-98e49-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"dttx-98e49",
  storageBucket:"dttx-98e49.firebasestorage.app",
  messagingSenderId:"42966455501",
  appId:"1:42966455501:web:857c386cbbad3269e34584"
};

// ── STATE ──
let db=null, SID='', units={}, order=[], turnIdx=0, isDemo=false;
let mapImg=null, brightness=1.0, hdrawMode=false, hdrawColor='#ff4444', hds=3;
let hdrawing=false, hstroke=null, hMyDrawings=[];
const canvas=document.getElementById('map-canvas');
const ctx=canvas.getContext('2d');

// ── START ──
function startSession(){
  const name=document.getElementById('sname').value.trim()||'EXERCISE TACMAP';
  SID='session_'+name.toLowerCase().replace(/[^a-z0-9]/g,'_').substr(0,20);
  // Generate short 4-digit session code for verification
  let hash=0;
  for(let i=0;i<SID.length;i++){hash=((hash<<5)-hash)+SID.charCodeAt(i);hash|=0;}
  const SESSION_CODE=Math.abs(hash).toString().substr(0,4).padStart(4,'0');
  document.getElementById('sess-lbl').textContent='SESSION: '+name+' | CODE: '+SESSION_CODE;
  // Store code in Firebase so players can see it
  if(db) db.ref(SID+'/meta/code').set(SESSION_CODE);
  try{
    const app=firebase.initializeApp(FB);
    db=firebase.database(app);
    document.getElementById('setup').style.display='none';
    initFirebase(name);
  }catch(e){alert('Firebase error: '+e.message);}
}

function demoMode(){
  isDemo=true;
  const name=document.getElementById('sname').value.trim()||'DEMO';
  SID='DEMO_'+Math.random().toString(36).substr(2,5).toUpperCase();
  document.getElementById('sess-lbl').textContent='SESSION: '+name+' (DEMO)';
  document.getElementById('setup').style.display='none';
  addDefaultUnits();
  renderUnits(); resize(); draw();
  log('Demo mode');
}

function initFirebase(name){
  db.ref('.info/connected').on('value',s=>{
    const ok=s.val();
    document.getElementById('hdot').className='hdot'+(ok?' live':'');
    if(ok){
      // Clear all drawings when host connects fresh
      db.ref(SID+'/drawings').remove();
      hMyDrawings=[]; hostAllDrawings={};
    }
  });
  db.ref(SID+'/units').on('value',s=>{
    const data=s.val();
    if(!data)return;
    Object.entries(data).forEach(([id,u])=>{
      if(units[id]){units[id]={...units[id],...u};}
      else{units[id]={...u};if(!order.includes(id))order.push(id);}
    });
    renderUnits(); draw();
  });
  db.ref(SID+'/turn').on('value',s=>{
    const t=s.val(); if(!t)return;
    turnIdx=order.indexOf(t.activeUnitId);
    updateTurnDisplay(); draw();
  });
  db.ref(SID+'/drawings').on('value',s=>{
    // Redraw all drawings from Firebase on canvas
    const all=s.val()||{};
    hostAllDrawings=all;
    draw();
  });
  db.ref(SID+'/chat').limitToLast(50).on('child_added',s=>{
    const m=s.val(); if(m) appendChat(m);
  });
  db.ref(SID+'/connections').on('value',s=>{
    const data=s.val()||{};
    Object.keys(units).forEach(id=>{units[id].online=!!data[id];});
    renderUnits();
  });
  // Listen for map uploads from Firebase
  db.ref(SID+'/meta/mapUrl').on('value',s=>{
    const url=s.val();
    if(url){mapImg=new Image();mapImg.onload=draw;mapImg.src=url;}
    else{mapImg=null;draw();}
  });
  addDefaultUnits();
  pushUnits();
  renderUnits(); resize(); draw();
  log('Session started: '+name);
}

let hostAllDrawings={};

// ── UNITS ──
function addDefaultUnits(){
  const defs=[
    {name:'Alpha Team',cs:'ALPHA-1',color:'#ff4444'},
    {name:'Bravo Team',cs:'BRAVO-1',color:'#4488ff'},
    {name:'Charlie Team',cs:'CHARLIE-1',color:'#44ff88'},
    {name:'HQ',cs:'HQ-MAIN',color:'#ffcc00'},
  ];
  defs.forEach(d=>{
    const id='unit_'+Date.now()+'_'+Math.random().toString(36).substr(2,4);
    units[id]={id,name:d.name,callsign:d.cs,iconColor:d.color,x:0.2+Math.random()*0.6,y:0.2+Math.random()*0.6,online:false};
    order.push(id);
  });
}

function addUnit(){
  const name=document.getElementById('uname').value.trim();
  const cs=document.getElementById('ucs').value.trim();
  if(!name)return;
  const id='unit_'+Date.now()+'_'+Math.random().toString(36).substr(2,4);
  units[id]={id,name,callsign:cs||name.toUpperCase().replace(' ','-'),iconColor:'#888888',x:0.3+Math.random()*0.4,y:0.3+Math.random()*0.4,online:false};
  order.push(id);
  document.getElementById('uname').value='';
  document.getElementById('ucs').value='';
  pushUnits(); renderUnits(); draw();
  log('Added: '+name);
}

function removeUnit(id){
  if(!confirm('Remove '+units[id].name+'?'))return;
  delete units[id];
  order=order.filter(x=>x!==id);
  if(!isDemo&&db)db.ref(SID+'/units/'+id).remove();
  renderUnits(); draw();
}

function pushUnits(){
  if(isDemo||!db)return;
  Object.entries(units).forEach(([id,u])=>db.ref(SID+'/units/'+id).set({id:u.id,name:u.name,callsign:u.callsign,iconColor:u.iconColor||'#888',x:u.x,y:u.y}));
}

function setUnitColor(id,color){
  units[id].iconColor=color;
  if(!isDemo&&db)db.ref(SID+'/units/'+id).update({iconColor:color});
  draw(); renderUnits();
}

function renameUnit(id,field,val){
  if(!val.trim())return;
  units[id][field]=val.trim();
  if(!isDemo&&db){const u={};u[field]=val.trim();db.ref(SID+'/units/'+id).update(u);}
  draw();
}

function renderUnits(){
  const list=document.getElementById('units-list');
  list.innerHTML='';
  const activeId=order[turnIdx];
  order.forEach((id,i)=>{
    const u=units[id]; if(!u)return;
    const div=document.createElement('div');
    div.className='ui'+(id===activeId?' active':'');
    div.innerHTML=`
      <input type="color" value="${u.iconColor||'#888888'}" style="width:22px;height:22px;border:none;border-radius:50%;padding:0;cursor:pointer;flex-shrink:0;background:none"
        onchange="setUnitColor('${id}',this.value)" onclick="event.stopPropagation()"/>
      <div class="ui-info">
        <input class="ui-name" value="${u.name}" onchange="renameUnit('${id}','name',this.value)" onclick="event.stopPropagation()"/>
        <input class="ui-cs" value="${u.callsign}" onchange="renameUnit('${id}','callsign',this.value)" onclick="event.stopPropagation()"/>
      </div>
      <div class="ui-dot ${u.online?'on':''}"></div>
      <button class="ui-del" onclick="event.stopPropagation();removeUnit('${id}')">✕</button>`;
    div.onclick=()=>{turnIdx=i;updateTurnDisplay();pushTurn();};
    list.appendChild(div);
  });
}

// ── TURNS ──
function nextTurn(){
  if(!order.length)return;
  turnIdx=(turnIdx+1)%order.length;
  updateTurnDisplay(); pushTurn();
}
function resetTurns(){turnIdx=0;updateTurnDisplay();pushTurn();}
function updateTurnDisplay(){
  const u=units[order[turnIdx]];
  document.getElementById('turn-disp').textContent=u?u.callsign:'— WAITING —';
  renderUnits();
}
function pushTurn(){
  if(isDemo||!db)return;
  db.ref(SID+'/turn').set({activeUnitId:order[turnIdx],index:turnIdx,ts:Date.now()});
}

// ── RESET ──
function resetSession(){
  if(!confirm('Reset ALL units and drawings?'))return;
  hMyDrawings=[]; hostAllDrawings={}; draw();
  if(!isDemo&&db){
    // First explicitly clear drawings, then remove whole session
    db.ref(SID+'/drawings').remove();
    db.ref(SID+'/units').remove();
    db.ref(SID+'/turn').remove();
    setTimeout(()=>{
      units={};order=[];turnIdx=0;
      addDefaultUnits();pushUnits();renderUnits();draw();
      log('Session reset');
    }, 500);
  }else{units={};order=[];turnIdx=0;addDefaultUnits();renderUnits();draw();}
}

// ── CANVAS & MAP ──
function resize(){
  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetHeight;
  draw();
}
window.addEventListener('resize',resize);

function draw(){
  const W=canvas.width,H=canvas.height; if(!W||!H)return;
  ctx.clearRect(0,0,W,H);
  // If no drawings, skip drawing phase
  const hasDrawings=Object.keys(hostAllDrawings).length>0||hMyDrawings.length>0;
  // Background
  if(mapImg){
    ctx.drawImage(mapImg,0,0,W,H);
  }else{
    ctx.fillStyle='#0e1a10';ctx.fillRect(0,0,W,H);
    // Grid
    ctx.strokeStyle='rgba(57,255,106,0.05)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  }
  // Brightness overlay
  if(brightness<1){
    ctx.save();ctx.globalAlpha=1-brightness;
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  // Draw all player drawings from Firebase
  Object.values(hostAllDrawings).forEach(strokeObj=>{
    if(!strokeObj||typeof strokeObj!=='object')return;
    Object.values(strokeObj).forEach(s=>{
      if(!s||!s.pts)return;
      const pts=Object.values(s.pts);
      if(pts.length<2)return;
      ctx.beginPath();ctx.strokeStyle=s.color||'#fff';
      ctx.lineWidth=s.size||2;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.moveTo(pts[0].x*W,pts[0].y*H);
      pts.slice(1).forEach(p=>ctx.lineTo(p.x*W,p.y*H));
      ctx.stroke();
    });
  });
  // Draw current host stroke
  if(hstroke&&hstroke.pts.length>1){
    ctx.beginPath();ctx.strokeStyle=hstroke.color;
    ctx.lineWidth=hstroke.size;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.moveTo(hstroke.pts[0].x*W,hstroke.pts[0].y*H);
    hstroke.pts.slice(1).forEach(p=>ctx.lineTo(p.x*W,p.y*H));
    ctx.stroke();
  }
  // Units
  const activeId=order[turnIdx];
  Object.values(units).forEach(u=>{
    if(!u)return;
    const px=u.x*W,py=u.y*H;
    const isAct=u.id===activeId;
    const c=u.iconColor||'#888';
    ctx.beginPath();ctx.arc(px,py,isAct?16:12,0,Math.PI*2);
    ctx.fillStyle=c;ctx.fill();
    if(isAct){ctx.strokeStyle='#39ff6a';ctx.lineWidth=2;ctx.stroke();}
    ctx.font='bold 11px system-ui';ctx.fillStyle='#000';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText((u.callsign||'?')[0],px,py);
    ctx.font='9px monospace';ctx.fillStyle=isAct?'#39ff6a':'#aaa';
    ctx.textBaseline='top';ctx.fillText(u.callsign||'',px,py+17);
  });
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}

// Canvas drag to move units
let drag=null,dox=0,doy=0;
canvas.addEventListener('mousedown',e=>{
  if(hdrawMode){
    hdrawing=true;
    const p=cpos(e);
    hstroke={color:hdrawColor,size:hds,pts:[p]};
    return;
  }
  const W=canvas.width,H=canvas.height;
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  for(const u of Object.values(units)){
    if(Math.hypot(mx-u.x*W,my-u.y*H)<18){drag=u.id;dox=mx-u.x*W;doy=my-u.y*H;break;}
  }
});
canvas.addEventListener('mousemove',e=>{
  if(hdrawMode&&hdrawing&&hstroke){
    hstroke.pts.push(cpos(e));draw();return;
  }
  if(!drag)return;
  const W=canvas.width,H=canvas.height;
  const r=canvas.getBoundingClientRect();
  units[drag].x=Math.max(0.01,Math.min(0.99,(e.clientX-r.left-dox)/W));
  units[drag].y=Math.max(0.01,Math.min(0.99,(e.clientY-r.top-doy)/H));
  draw();
});
canvas.addEventListener('mouseup',()=>{
  if(hdrawMode&&hdrawing&&hstroke){
    hdrawing=false;
    if(hstroke.pts.length>1){
      hMyDrawings.push({color:hstroke.color,size:hstroke.size,pts:[...hstroke.pts]});
      saveHostDrawings();
    }
    hstroke=null;draw();return;
  }
  if(drag){
    if(!isDemo&&db)db.ref(SID+'/units/'+drag).update({x:units[drag].x,y:units[drag].y});
    log(units[drag].name+' moved');drag=null;
  }
});

function cpos(e){
  const r=canvas.getBoundingClientRect();
  return{x:(e.clientX-r.left)/canvas.width,y:(e.clientY-r.top)/canvas.height};
}

// ── HOST DRAW ──
function toggleDraw(){
  hdrawMode=!hdrawMode;
  document.getElementById('hdrawbtn').textContent='✏ DRAW: '+(hdrawMode?'ON':'OFF');
  document.getElementById('hdrawbtn').style.borderColor=hdrawMode?'var(--ac)':'var(--dm)';
  document.getElementById('hdrawbtn').style.color=hdrawMode?'var(--ac)':'var(--dm)';
}
function hdc(c,el){
  hdrawColor=c;
  document.querySelectorAll('.sec-b div[style*="border-radius:50%"]').forEach(d=>d.style.borderColor='transparent');
  if(el)el.style.borderColor='#fff';
}
function saveHostDrawings(){
  if(isDemo||!db)return;
  const obj={};
  hMyDrawings.forEach((s,i)=>{
    const pts={};
    s.pts.forEach((p,j)=>pts['p'+j]={x:Math.round(p.x*10000)/10000,y:Math.round(p.y*10000)/10000});
    obj['s'+i]={color:s.color,size:s.size,pts};
  });
  db.ref(SID+'/drawings/HOST').set(Object.keys(obj).length?obj:null);
}
function clearAllDrawings(){
  if(!confirm('Clear all drawings?'))return;
  hMyDrawings=[];hostAllDrawings={};
  if(!isDemo&&db)db.ref(SID+'/drawings').remove();
  draw();
}

// ── MAP ──
function uploadMap(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    mapImg=new Image();mapImg.onload=draw;mapImg.src=ev.target.result;
    if(!isDemo&&db)db.ref(SID+'/meta/mapUrl').set(ev.target.result);
    log('Map uploaded');
  };
  r.readAsDataURL(file);
}
function clearMap(){
  mapImg=null;
  if(!isDemo&&db)db.ref(SID+'/meta/mapUrl').remove();
  draw();
}
function setBrightness(v){
  brightness=parseFloat(v);draw();
  if(!isDemo&&db)db.ref(SID+'/meta/brightness').set(brightness);
}

// ── QR ──
function showQR(){
  if(!SID){alert('Start session first');return;}
  const grid=document.getElementById('qr-grid');grid.innerHTML='';
  const base=location.origin+location.pathname.replace('host.html','')+'player.html';
  order.forEach(id=>{
    const u=units[id];if(!u)return;
    const url=base+'?session='+encodeURIComponent(SID)+'&unit='+encodeURIComponent(id);
    const qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data='+encodeURIComponent(url)+'&format=png';
    const card=document.createElement('div');card.className='qr-card';
    card.innerHTML=`<h4>${u.name}<br><small style="color:var(--dm)">${u.callsign}</small></h4>
      <img src="${qrUrl}" width="150" height="150" style="border:1px solid var(--bd);background:#fff"/>
      <div class="qr-url">${url}</div>`;
    grid.appendChild(card);
  });
  document.getElementById('qr-modal').classList.add('open');
}

// ── CHAT ──
function sendChat(){
  const inp=document.getElementById('chat-in'),txt=inp.value.trim();
  if(!txt)return;
  if(!isDemo&&db)db.ref(SID+'/chat').push({sender:'HQ',isHost:true,text:txt,ts:Date.now()});
  else appendChat({sender:'HQ',isHost:true,text:txt,ts:Date.now()});
  inp.value='';
}
function appendChat(m){
  const msgs=document.getElementById('chat-msgs'),d=document.createElement('div');d.className='cm';
  const t=new Date(m.ts),ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  d.innerHTML=`<span class="cs${m.isHost?' h':''}">${m.sender}</span> ${m.text} <span style="font-size:9px;color:var(--dm)">${ts}</span>`;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}

// ── LOG ──
function log(msg){
  const l=document.getElementById('log'),d=document.createElement('div');d.className='le';
  const t=new Date(),ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0')+':'+t.getSeconds().toString().padStart(2,'0');
  d.innerHTML=`[${ts}] <span>${msg}</span>`;l.prepend(d);
}

setTimeout(resize,100);
</script>
