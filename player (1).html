<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>TACMAP — Unit View</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f0d;
      --surface: #111a14;
      --border: #1f3a24;
      --accent: #39ff6a;
      --accent2: #00e5ff;
      --danger: #ff4444;
      --warn: #ffaa00;
      --text: #c8e6c9;
      --dim: #4a6950;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
      pointer-events: none; z-index: 9999;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .logo { font-family: 'Share Tech Mono', monospace; font-size: 14px; color: var(--accent); letter-spacing: 3px; text-shadow: 0 0 10px var(--accent); }
    .unit-badge {
      background: rgba(57,255,106,0.1);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 2px;
      font-size: 13px;
      font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }
    .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); margin-left: auto; }
    .conn-dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Turn banner */
    #turn-banner {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-align: center;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      color: var(--dim);
      transition: all 0.3s;
      flex-shrink: 0;
    }
    #turn-banner.your-turn {
      background: rgba(57,255,106,0.12);
      border-bottom-color: var(--accent);
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
      animation: glow-pulse 1.5s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%,100% { box-shadow: inset 0 0 15px rgba(57,255,106,0.1); }
      50% { box-shadow: inset 0 0 30px rgba(57,255,106,0.2); }
    }
    #turn-banner.waiting { color: var(--dim); }

    /* Map */
    #map-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }
    #map-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #map-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(57,255,106,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,255,106,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Instruction overlay */
    #instruction {
      position: absolute;
      bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(10,15,13,0.9);
      border: 1px solid var(--border);
      padding: 8px 16px;
      font-size: 12px;
      color: var(--dim);
      white-space: nowrap;
      pointer-events: none;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1px;
      z-index: 10;
    }
    #instruction.active { border-color: var(--accent); color: var(--accent); }

    /* Confirm move button */
    #confirm-btn {
      display: none;
      position: absolute;
      bottom: 60px; left: 50%; transform: translateX(-50%);
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 12px 28px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(57,255,106,0.4);
      z-index: 20;
      animation: btn-pulse 0.8s ease-in-out infinite;
    }
    @keyframes btn-pulse { 0%,100%{box-shadow:0 0 20px rgba(57,255,106,0.4)} 50%{box-shadow:0 0 35px rgba(57,255,106,0.7)} }

    /* Bottom status bar */
    #status-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    .status-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .status-label { font-size: 9px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; }
    .status-val { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text); }
    .status-val.accent { color: var(--accent); }

    /* Error/loading screen */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 5000;
      gap: 16px;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--dim); }

    #error-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 5001;
      gap: 12px;
      padding: 24px;
      text-align: center;
    }
    #error-screen h2 { color: var(--danger); font-size: 20px; letter-spacing: 2px; }
    #error-screen p { color: var(--dim); font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>CONNECTING TO TACMAP…</p>
</div>

<div id="error-screen">
  <h2>⚠ CONNECTION ERROR</h2>
  <p id="error-msg">Could not connect to session.</p>
</div>

<header>
  <div class="logo">⬡ TACMAP</div>
  <div class="unit-badge" id="unit-badge">—</div>
  <div class="conn-dot" id="conn-dot"></div>
</header>

<div id="turn-banner" class="waiting">WAITING FOR TURN…</div>

<div id="map-wrap">
  <canvas id="map-canvas"></canvas>
  <div id="instruction">TAP & DRAG YOUR UNIT TO MOVE</div>
  <button id="confirm-btn" onclick="confirmMove()">✓ CONFIRM MOVE</button>
</div>

<div id="status-bar">
  <div class="status-item">
    <span class="status-label">Unit</span>
    <span class="status-val accent" id="sb-unit">—</span>
  </div>
  <div class="status-item">
    <span class="status-label">Callsign</span>
    <span class="status-val" id="sb-callsign">—</span>
  </div>
  <div class="status-item">
    <span class="status-label">Status</span>
    <span class="status-val" id="sb-status">OFFLINE</span>
  </div>
  <div class="status-item">
    <span class="status-label">Turn</span>
    <span class="status-val" id="sb-turn">—</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// PARSE URL PARAMS
// ═══════════════════════════════════════════════
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session');
const myUnitId = params.get('unit');
const firebaseConfigRaw = JSON.stringify({
  apiKey: "AIzaSyAbKI8JQ4VoZ6pr7UrSl_ovk10f0dx1AsU",
  authDomain: "dttx-98e49.firebaseapp.com",
  databaseURL: "https://dttx-98e49-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dttx-98e49",
  storageBucket: "dttx-98e49.firebasestorage.app",
  messagingSenderId: "42966455501",
  appId: "1:42966455501:web:857c386cbbad3269e34584"
});

if (!sessionId || !myUnitId) {
  showError('Invalid QR code. Missing session parameters.');
}

let db = null;
let myUnit = null;
let allUnits = {};
let currentTurnUnitId = null;
let isMyTurn = false;
let pendingX = null, pendingY = null;
let hasPendingMove = false;

// ═══════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════
function init() {
  let config;
  try {
    config = JSON.parse(firebaseConfigRaw);
  } catch(e) {
    showError('Invalid Firebase config in QR code.');
    return;
  }

  try {
    const app = firebase.initializeApp(config, 'player_' + Date.now());
    db = firebase.database(app);
  } catch(e) {
    showError('Firebase init failed: ' + e.message);
    return;
  }

  // Connection state
  db.ref('.info/connected').on('value', snap => {
    const connected = snap.val();
    document.getElementById('conn-dot').className = 'conn-dot' + (connected ? ' live' : '');
    document.getElementById('sb-status').textContent = connected ? 'LIVE' : 'RECONNECT';
    if (connected) {
      // Mark self as connected
      db.ref(sessionId + '/connections/' + myUnitId).set(true);
      db.ref(sessionId + '/connections/' + myUnitId).onDisconnect().remove();
    }
  });

  // Load units
  db.ref(sessionId + '/units').on('value', snap => {
    const data = snap.val();
    if (!data) { showError('Session not found. Ask host to start session.'); return; }
    allUnits = data;
    myUnit = data[myUnitId];
    if (!myUnit) { showError('Unit not found. Ask host to re-share QR.'); return; }

    document.getElementById('loading').style.display = 'none';
    updateUnitBadge();
    resize();
    draw();
  });

  // Listen for turn changes
  db.ref(sessionId + '/turn').on('value', snap => {
    const turn = snap.val();
    if (!turn) return;
    currentTurnUnitId = turn.activeUnitId;
    isMyTurn = currentTurnUnitId === myUnitId;
    updateTurnBanner();
    draw();
  });
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-screen').style.display = 'flex';
  document.getElementById('error-msg').textContent = msg;
}

function updateUnitBadge() {
  if (!myUnit) return;
  document.getElementById('unit-badge').innerHTML = `${myUnit.icon} ${myUnit.name}`;
  document.getElementById('sb-unit').textContent = myUnit.name;
  document.getElementById('sb-callsign').textContent = myUnit.callsign;
}

function updateTurnBanner() {
  const banner = document.getElementById('turn-banner');
  const currentUnit = allUnits[currentTurnUnitId];
  if (isMyTurn) {
    banner.className = 'your-turn';
    banner.textContent = '▶ YOUR TURN — MOVE YOUR UNIT';
    document.getElementById('instruction').className = 'active';
    document.getElementById('instruction').textContent = 'DRAG YOUR UNIT TO NEW POSITION';
    document.getElementById('sb-turn').textContent = 'YOURS';
  } else {
    banner.className = 'waiting';
    const name = currentUnit ? `${currentUnit.icon} ${currentUnit.callsign}` : '—';
    banner.textContent = `WAITING — ${name} IS MOVING`;
    document.getElementById('instruction').className = '';
    document.getElementById('instruction').textContent = 'STAND BY…';
    document.getElementById('sb-turn').textContent = currentUnit ? currentUnit.callsign : '—';
    hasPendingMove = false;
    document.getElementById('confirm-btn').style.display = 'none';
  }
}

// ═══════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
let dragging = false;
let dragStartX = 0, dragStartY = 0;

function resize() {
  const wrap = document.getElementById('map-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  draw();
}
window.addEventListener('resize', resize);

function draw() {
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;
  ctx.clearRect(0,0,W,H);
  drawMap(W,H);

  Object.values(allUnits).forEach(u => {
    if (!u) return;
    const isMe = u.id === myUnitId;
    const isActive = u.id === currentTurnUnitId;

    let px, py;
    if (isMe && hasPendingMove) {
      px = pendingX * W; py = pendingY * H;
    } else {
      px = u.x * W; py = u.y * H;
    }

    // Mine: bigger, highlighted
    const radius = isMe ? 22 : 14;

    if (isActive && !isMe) {
      ctx.save();
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(px, py, radius + 5, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,170,0,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }

    if (isMe) {
      ctx.save();
      ctx.shadowColor = '#39ff6a';
      ctx.shadowBlur = hasPendingMove ? 30 : 15;
      ctx.beginPath();
      ctx.arc(px, py, radius + 4, 0, Math.PI*2);
      ctx.strokeStyle = hasPendingMove ? '#39ff6a' : 'rgba(57,255,106,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }

    // BG circle
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI*2);
    ctx.fillStyle = isMe
      ? (hasPendingMove ? 'rgba(57,255,106,0.25)' : 'rgba(57,255,106,0.15)')
      : 'rgba(10,15,13,0.75)';
    ctx.fill();
    ctx.strokeStyle = isMe ? '#39ff6a' : (isActive ? '#ffaa00' : '#1f3a24');
    ctx.lineWidth = isMe ? 2 : 1;
    ctx.stroke();

    // Icon
    ctx.font = `${isMe ? 22 : 16}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(u.icon, px, py);

    // Label
    ctx.font = `600 ${isMe ? 11 : 9}px Rajdhani, sans-serif`;
    ctx.fillStyle = isMe ? '#39ff6a' : (isActive ? '#ffaa00' : '#4a6950');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(u.callsign, px, py + radius + 2);

    // "YOU" label
    if (isMe) {
      ctx.font = '700 10px Rajdhani, sans-serif';
      ctx.fillStyle = 'rgba(57,255,106,0.8)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText('▲ YOU', px, py - radius - 2);
    }
  });
}

function drawMap(W, H) {
  const grad = ctx.createRadialGradient(W*0.5, H*0.5, 0, W*0.5, H*0.5, W*0.7);
  grad.addColorStop(0, '#0e1e11');
  grad.addColorStop(1, '#080e0a');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  const terrainColors = ['#0d1f10','#0c1c0f','#0f2212','#0b1a0e'];
  for (let i=0;i<12;i++) {
    ctx.beginPath();
    const tx=Math.sin(i*37.5)*0.3*W+W*0.5+Math.cos(i*22.1)*0.4*W;
    const ty=Math.cos(i*41.3)*0.3*H+H*0.5+Math.sin(i*29.7)*0.35*H;
    ctx.ellipse(tx, ty, 35+Math.sin(i*17)*80, 25+Math.cos(i*23)*60, i*0.5, 0, Math.PI*2);
    ctx.fillStyle = terrainColors[i%terrainColors.length];
    ctx.fill();
  }

  // Phase line
  const ply = H * 0.4;
  ctx.beginPath(); ctx.moveTo(0, ply); ctx.lineTo(W, ply);
  ctx.strokeStyle = 'rgba(0,229,255,0.12)';
  ctx.lineWidth = 1; ctx.setLineDash([8,6]); ctx.stroke(); ctx.setLineDash([]);
  ctx.font = '9px Share Tech Mono'; ctx.fillStyle = 'rgba(0,229,255,0.25)';
  ctx.textAlign = 'center'; ctx.fillText('PHASE LINE 1', W*0.5, ply-5);

  // Objectives
  [[0.15,0.2,'OBJ A'],[0.75,0.25,'OBJ B'],[0.5,0.65,'OBJ C']].forEach(([rx,ry,lbl]) => {
    const px=rx*W, py=ry*H;
    ctx.beginPath(); ctx.rect(px-10,py-10,20,20);
    ctx.strokeStyle='rgba(255,170,0,0.3)'; ctx.lineWidth=1; ctx.stroke();
    ctx.font='9px Share Tech Mono'; ctx.fillStyle='rgba(255,170,0,0.35)';
    ctx.textAlign='center'; ctx.fillText(lbl, px, py+16);
    ctx.font='11px serif'; ctx.fillStyle='rgba(255,170,0,0.4)';
    ctx.textBaseline='middle'; ctx.fillText('★', px, py);
  });

  // Compass (small)
  ctx.save();
  ctx.translate(W-28, H-28);
  ctx.strokeStyle='rgba(57,255,106,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(0,12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(12,0); ctx.stroke();
  ctx.font='bold 10px Rajdhani'; ctx.fillStyle='rgba(57,255,106,0.4)';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('N',0,-17);
  ctx.restore();
}

// ═══════════════════════════════════════════════
// TOUCH / DRAG (own unit only, on your turn)
// ═══════════════════════════════════════════════
function getTouchPos(touch) {
  const rect = canvas.getBoundingClientRect();
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function isOnMyUnit(mx, my) {
  if (!myUnit || !allUnits[myUnitId]) return false;
  const W = canvas.width, H = canvas.height;
  const u = allUnits[myUnitId];
  const px = (hasPendingMove ? pendingX : u.x) * W;
  const py = (hasPendingMove ? pendingY : u.y) * H;
  return Math.hypot(mx - px, my - py) < 30;
}

canvas.addEventListener('touchstart', e => {
  if (!isMyTurn) return;
  e.preventDefault();
  const pos = getTouchPos(e.touches[0]);
  if (isOnMyUnit(pos.x, pos.y)) {
    dragging = true;
    dragStartX = pos.x; dragStartY = pos.y;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (!dragging || !isMyTurn) return;
  e.preventDefault();
  const pos = getTouchPos(e.touches[0]);
  const W = canvas.width, H = canvas.height;
  pendingX = Math.max(0.02, Math.min(0.98, pos.x / W));
  pendingY = Math.max(0.02, Math.min(0.98, pos.y / H));
  hasPendingMove = true;
  document.getElementById('confirm-btn').style.display = 'block';
  document.getElementById('instruction').textContent = 'RELEASE THEN CONFIRM';
  draw();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  dragging = false;
}, { passive: false });

// Mouse support too
canvas.addEventListener('mousedown', e => {
  if (!isMyTurn) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  if (isOnMyUnit(mx, my)) dragging = true;
});
canvas.addEventListener('mousemove', e => {
  if (!dragging || !isMyTurn) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const W = canvas.width, H = canvas.height;
  pendingX = Math.max(0.02, Math.min(0.98, mx/W));
  pendingY = Math.max(0.02, Math.min(0.98, my/H));
  hasPendingMove = true;
  document.getElementById('confirm-btn').style.display = 'block';
  draw();
});
canvas.addEventListener('mouseup', () => { dragging = false; });

// ═══════════════════════════════════════════════
// CONFIRM MOVE
// ═══════════════════════════════════════════════
function confirmMove() {
  if (!hasPendingMove || !db) return;

  db.ref(sessionId + '/units/' + myUnitId).update({ x: pendingX, y: pendingY });

  // Also update local
  if (allUnits[myUnitId]) {
    allUnits[myUnitId].x = pendingX;
    allUnits[myUnitId].y = pendingY;
  }

  hasPendingMove = false;
  document.getElementById('confirm-btn').style.display = 'none';
  document.getElementById('instruction').textContent = 'MOVE SENT — WAITING FOR HOST';
  document.getElementById('turn-banner').className = 'waiting';
  document.getElementById('turn-banner').textContent = '✓ MOVE CONFIRMED — WAITING FOR NEXT TURN';
  draw();
}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
if (sessionId && myUnitId && firebaseConfigRaw) {
  init();
}
</script>
</body>
</html>
